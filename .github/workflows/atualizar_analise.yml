name: Atualizar Analise NLP

on:
  repository_dispatch:
    types: [atualizar-analise]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  gerar-analise:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas scikit-learn gspread google-auth networkx

      - name: Criar credentials.json
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Rodar analise NLP
        run: |
          python src/gerar_analise.py \
            --fonte sheets \
            --sheet-id ${{ secrets.SHEET_ID }} \
            --aba-minuta Minuta \
            --aba-votos Votos \
            --credentials credentials.json \
            --output-dir docs/

      - name: Remover credentials
        run: rm -f credentials.json

      - name: Commitar HTMLs atualizados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Analise NLP atualizada
          file_pattern: docs/
