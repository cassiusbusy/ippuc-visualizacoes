name: Atualizar Analise NLP

on:
  repository_dispatch:
    types: [atualizar-analise]
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  gerar-analise:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configurar git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/cassiusbusy/ippuc-visualizacoes.git

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install pandas scikit-learn gspread google-auth networkx

      - name: Criar credentials.json
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Rodar analise NLP
        run: |
          python src/gerar_analise.py \
            --fonte sheets \
            --sheet-id ${{ secrets.SHEET_ID }} \
            --aba-minuta Minuta \
            --aba-votos Votos \
            --credentials credentials.json \
            --output-dir docs/

      - name: Remover credentials
        run: rm -f credentials.json

      - name: Commitar HTMLs atualizados
        run: |
          git add docs/
          git diff --staged --quiet && echo "Sem mudancas" && exit 0
          git commit -m "Analise NLP atualizada [$(date '+%Y-%m-%d %H:%M')]"
          git push --force origin main
