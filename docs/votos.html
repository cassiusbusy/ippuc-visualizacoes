
<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Resultado da Votacao — Plano Diretor Curitiba</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');
:root{--v:#00a859;--vl:#e6f7ee;--az:#447EC0;--azd:#1a3a5c;--la:#F07E31;
      --bg:#fff;--cd:#f3f3f3;--bd:#e2e4e8;--tx:#1a1a2e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;}
.stripe{height:5px;display:flex;}.stripe div{flex:1;}
.cnt{max-width:1100px;margin:0 auto;padding:24px;}
.ptitle{font-size:1.1rem;font-weight:700;color:var(--azd);margin-bottom:4px;}
.psub{font-size:.8rem;color:#888;margin-bottom:20px;}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--az);font-size:.78rem;font-weight:500;text-decoration:none;margin-bottom:14px;}

/* KPIs */
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.kpi{background:var(--cd);border-radius:10px;padding:16px;border:.5px solid var(--bd);text-align:center;}
.knum{font-size:2.2rem;font-weight:900;}
.klbl{font-size:.75rem;color:#888;margin-top:3px;font-weight:500;}
.knum.tot{color:var(--azd);}
.knum.ad{color:var(--v);}
.knum.pr{color:var(--la);}
.knum.vt{color:var(--az);}

/* Filtro */
.filtro-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.fbtn{padding:7px 18px;border-radius:20px;border:1.5px solid var(--bd);background:#fff;
       cursor:pointer;font-family:Roboto,sans-serif;font-size:.78rem;font-weight:500;
       color:#666;transition:all .15s;}
.fbtn:hover{border-color:var(--v);color:var(--v);}
.fbtn.ativo{background:var(--v);border-color:var(--v);color:#fff;font-weight:700;}
.fbtn:disabled{opacity:.35;cursor:not-allowed;}

/* Legenda */
.leg{display:flex;gap:18px;margin-bottom:16px;font-size:.78rem;}
.leg-item{display:flex;align-items:center;gap:6px;font-weight:500;}
.leg-dot{width:14px;height:14px;border-radius:3px;}

/* Grafico */
.chart-wrap{background:var(--cd);border-radius:12px;padding:20px;border:.5px solid var(--bd);}
.chart-title{font-size:.8rem;font-weight:700;color:var(--azd);text-transform:uppercase;
              letter-spacing:.06em;margin-bottom:16px;}
.bar-row{display:flex;align-items:center;margin-bottom:10px;gap:8px;}
.bar-label{width:240px;font-size:.74rem;color:#444;text-align:right;flex-shrink:0;
            line-height:1.3;padding-right:6px;}
.bar-center{flex:1;display:flex;align-items:center;gap:0;}
.bar-precisa{height:26px;background:var(--la);border-radius:4px 0 0 4px;
              display:flex;align-items:center;justify-content:flex-start;
              padding-left:5px;transition:width .5s ease;min-width:0;}
.bar-adequado{height:26px;background:var(--v);border-radius:0 4px 4px 0;
               display:flex;align-items:center;justify-content:flex-end;
               padding-right:5px;transition:width .5s ease;min-width:0;}
.bar-val{font-size:.72rem;font-weight:700;color:#fff;white-space:nowrap;}
.bar-zero{width:2px;background:#ccc;height:26px;flex-shrink:0;}
.axis-line{border-top:1.5px solid #d0d0d0;margin:4px 0 12px;position:relative;}
.sem-dados{text-align:center;padding:40px;color:#bbb;font-size:.9rem;}
.nota{font-size:.7rem;color:#aaa;margin-top:12px;text-align:center;}

@media(max-width:700px){
  .krow{grid-template-columns:1fr 1fr;}
  .bar-label{width:140px;font-size:.68rem;}
}
</style></head><body>

<div class="stripe">
  <div style="background:#00a859"></div><div style="background:#447EC0"></div>
  <div style="background:#8E6CAD"></div><div style="background:#8EC899"></div>
  <div style="background:#FDC533"></div><div style="background:#F07E31"></div>
  <div style="background:#EA535E"></div><div style="background:#CA6673"></div>
</div>

<div class="cnt">
  <a class="back" href="index.html">← Voltar</a>
  <div class="ptitle">Resultado da Votacao</div>
  <div class="psub">Avaliacao da minuta pelos participantes da consulta publica — Plano Diretor de Curitiba 2025</div>

  <div class="krow">
    <div class="kpi"><div class="knum vt">36</div><div class="klbl">Votantes</div></div>
    <div class="kpi"><div class="knum tot">155</div><div class="klbl">Votos</div></div>
    <div class="kpi"><div class="knum pr">50</div><div class="klbl">Precisa de Ajuste</div></div>
    <div class="kpi"><div class="knum ad">105</div><div class="klbl">Adequado</div></div>
  </div>

  <div class="filtro-row" id="filtros"></div>

  <div class="leg">
    <div class="leg-item"><div class="leg-dot" style="background:var(--la)"></div><span>Precisa de Ajuste</span></div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--v)"></div><span>Adequado</span></div>
  </div>

  <div class="chart-wrap">
    <div class="chart-title" id="chart-title">Por Titulo</div>
    <div id="chart"></div>
    <div class="nota" id="nota"></div>
  </div>

</div>

<script>
const D={"kpis": {"votantes": 45, "total": 236, "adequado": 178, "precisa": 58}, "niveis": {"titulo": [{"nome": "TÍTULO I – DO DESENVOLVIMENTO URBANO SUSTENTÁVEL", "adequado": 27, "precisa": 13}, {"nome": "TÍTULO III – DA POLÍTICA TERRITORIAL INTEGRADA", "adequado": 19, "precisa": 7}, {"nome": "TÍTULO II – DA INTEGRAÇÃO METROPOLITANA", "adequado": 18, "precisa": 7}, {"nome": "TÍTULO IV – DA ARTICULAÇÃO DE POLÍTICAS PÚBLICAS NO TERRITÓRIO", "adequado": 18, "precisa": 6}, {"nome": "TÍTULO VII – DAS DISPOSIÇÕES FINAIS E TRANSITÓRIAS", "adequado": 12, "precisa": 8}, {"nome": "TÍTULO VI – DO SISTEMA DE PLANEJAMENTO E GESTÃO DEMOCRÁTICA DA CIDADE", "adequado": 12, "precisa": 4}, {"nome": "TÍTULO V – DOS INSTRUMENTOS DA POLÍTICA TERRITORIAL INTEGRADA", "adequado": 10, "precisa": 5}], "capitulo": [{"nome": "CAPÍTULO I – DAS DISPOSIÇÕES PRELIMINARES", "adequado": 4, "precisa": 0}, {"nome": "CAPÍTULO II – DA VISÃO DE FUTURO DE DESENVOLVIMENTO URBANO SUSTENTÁVEL", "adequado": 3, "precisa": 0}, {"nome": "CAPÍTULO I – DISPOSIÇÕES GERAIS E CLASSIFICAÇÃO DOS INSTRUMENTOS", "adequado": 1, "precisa": 1}, {"nome": "CAPÍTULO II – INSTRUMENTOS DE INDUÇÃO AO CUMPRIMENTO DA FUNÇÃO SOCIAL DA PROPRIEDADE", "adequado": 1, "precisa": 1}, {"nome": "CAPÍTULO II – DA ARTICULAÇÃO DAS POLÍTICAS PÚBLICAS MUNICIPAIS COM AS FUNÇÕES PÚBLICAS DE INTERESSE COMUM (FPICS)", "adequado": 2, "precisa": 0}, {"nome": "CAPÍTULO I – DO ALINHAMENTO MUNICIPAL COM A MACROESTRUTURAÇÃO METROPOLITANA", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO I – DO DESENVOLVIMENTO SOCIAL", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO II – DA GESTÃO DO PLANEJAMENTO INTEGRADO", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO II – DO DESENVOLVIMENTO ECONÔMICO", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO II – DO ORDENAMENTO TERRITORIAL", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO III – DA DEFESA SOCIAL", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO III – DAS ESTRATÉGIAS DE DESENVOLVIMENTO URBANO SUSTENTÁVEL", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO III – DO SISTEMA MUNICIPAL DE HABITAÇÃO", "adequado": 0, "precisa": 1}, {"nome": "CAPÍTULO III – INSTRUMENTOS DE OTIMIZAÇÃO DO USO DO SOLO E DA PRODUÇÃO IMOBILIÁRIA", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO IV – INSTRUMENTOS DE PLANEJAMENTO E INTERVENÇÃO EM ÁREAS ESTRATÉGICAS", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO V – DA ESTRUTURAÇÃO E FINANCIAMENTO DE PLANOS, PROGRAMAS E PROJETOS ESTRATÉGICOS", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO V – INSTRUMENTOS DE GESTÃO URBANA E AMBIENTAL", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO VI – INSTRUMENTOS DE REGULARIZAÇÃO FUNDIÁRIA E PROVISÃO DE HABITAÇÃO", "adequado": 1, "precisa": 0}, {"nome": "CAPÍTULO VII – INSTRUMENTOS FISCAIS E ECONÔMICOS", "adequado": 1, "precisa": 0}], "secao": [{"nome": "SEÇÃO I – Da Dimensão Metropolitana no Ordenamento Territorial do município-polo da RMC", "adequado": 2, "precisa": 1}, {"nome": "SEÇÃO II – Das estratégias e dos Instrumentos de Integração Metropolitana", "adequado": 3, "precisa": 0}, {"nome": "SEÇÃO IV – Da Habitação de Interesse Social", "adequado": 2, "precisa": 0}, {"nome": "SEÇÃO V – Do Desenvolvimento Social e Econômico", "adequado": 1, "precisa": 1}, {"nome": "SEÇÃO I – Da Estruturação Urbana", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO I – Do Desenvolvimento orientado pela Sustentabilidade Urbana", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO I – Do Planejamento Territorial e Uso do Solo", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO I – Da Política Integrada de Desenvolvimento Econômico Sustentável", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO I – Da Política Integrada de Defesa Social", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO II – Da Cidade Inteligente, Inovadora e Educadora", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO II – Da Inovação", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO II – Da Segurança Alimentar e Nutricional", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO II – Da Mobilidade Metropolitana", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO II – Das Garantias e Direitos Humanos e Sociais", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO II – Das Macroestratégias da Política Territorial Integrada", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO I – Dos Princípios e da Visão 2050 de Desenvolvimento Urbano Sustentável", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO I – Da Política Integrada de Desenvolvimento Social", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO III – Da Economia de Baixo Carbono e Circular", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO II – Dos Objetivos e Diretrizes de Desenvolvimento Urbano Sustentável", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO III – Da Segurança Cidadã", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO III – Da Educação", "adequado": 0, "precisa": 1}, {"nome": "SEÇÃO III – Do Meio Ambiente e Recursos Hídricos", "adequado": 0, "precisa": 1}, {"nome": "SEÇÃO IV – Da Cultura", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO IV – Da Indústria e Logística", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO III – Da Mitigação, Adaptação e Resiliência às Mudanças Climáticas", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO IV – Da Liberdade Econômica e Prosperidade Compartilhada", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO IV – Da Resposta às Calamidades", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO V – Da Economia Criativa", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO V – Do Esporte, Lazer e Juventude", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO VI – Da Saúde", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO VI – Do Turismo", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO VII – Da Assistência Social", "adequado": 1, "precisa": 0}, {"nome": "SEÇÃO VII – Do Empreendedorismo", "adequado": 0, "precisa": 1}], "subsecao": [{"nome": "SUBSEÇÃO I – Da Estruturação do Uso do Solo", "adequado": 1, "precisa": 0}, {"nome": "SUBSEÇÃO I – Macroestratégias Urbanas", "adequado": 1, "precisa": 0}, {"nome": "SUBSEÇÃO II – Da Estruturação Viária", "adequado": 1, "precisa": 0}, {"nome": "SUBSEÇÃO III – Da Estruturação do Transporte Coletivo", "adequado": 1, "precisa": 0}]}};
const NIVEIS=[
  {id:'titulo',   label:'Titulo'},
  {id:'capitulo', label:'Capitulo'},
  {id:'secao',    label:'Secao'},
  {id:'subsecao', label:'Subsecao'},
];
let nivelAtivo='titulo';

function init(){
  // Botoes de filtro
  const fr=document.getElementById('filtros');
  NIVEIS.forEach(n=>{
    const btn=document.createElement('button');
    btn.className='fbtn'+(n.id==='titulo'?' ativo':'');
    btn.textContent=n.label;
    const temDados=D.niveis[n.id]&&D.niveis[n.id].length>0;
    if(!temDados)btn.disabled=true;
    btn.onclick=()=>{if(!temDados)return;nivelAtivo=n.id;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('ativo'));btn.classList.add('ativo');renderChart();};
    fr.appendChild(btn);
  });
  renderChart();
}

function renderChart(){
  const el=document.getElementById('chart');
  const nota=document.getElementById('nota');
  const dados=D.niveis[nivelAtivo]||[];
  const lbl=NIVEIS.find(n=>n.id===nivelAtivo)?.label||'';
  document.getElementById('chart-title').textContent='Por '+lbl;

  if(!dados.length){
    el.innerHTML='<div class="sem-dados">Nenhum voto registrado neste nivel ainda.<br>Os votos de capitulos, secoes e subsecoes serao exibidos conforme chegarem novas submissoes.</div>';
    nota.textContent='';return;
  }

  // Calcular escala: max valor absoluto de adequado ou precisa
  const maxVal=Math.max(...dados.map(d=>Math.max(d.adequado,d.precisa)),1);
  const BAR_MAX=220; // px max para cada lado

  // Linha zero central
  let html='<div class="axis-line"></div>';

  dados.forEach(d=>{
    const wA=Math.round(d.adequado/maxVal*BAR_MAX);
    const wP=Math.round(d.precisa/maxVal*BAR_MAX);
    const nome=d.nome.replace(/TÍTULO\s+/i,'TÍTULO ');

    html+=`<div class="bar-row">
      <div class="bar-label" title="${d.nome}">${nome.length>55?nome.slice(0,55)+'...':nome}</div>
      <div class="bar-center">
        <div style="flex:1;display:flex;justify-content:flex-end;">
          <div class="bar-precisa" style="width:${wP}px;">
            ${d.precisa>0?`<span class="bar-val">-${d.precisa}</span>`:''}
          </div>
        </div>
        <div class="bar-zero"></div>
        <div style="flex:1;display:flex;justify-content:flex-start;">
          <div class="bar-adequado" style="width:${wA}px;">
            ${d.adequado>0?`<span class="bar-val">${d.adequado}</span>`:''}
          </div>
        </div>
      </div>
    </div>`;
  });

  el.innerHTML=html;

  // Nota de disponibilidade
  const disponiveis=NIVEIS.filter(n=>D.niveis[n.id]&&D.niveis[n.id].length>0).map(n=>n.label);
  nota.textContent=disponiveis.length<4?'Niveis com dados: '+disponiveis.join(', ')+'. Demais niveis serao preenchidos com novas submissoes.':'';
}

init();
</script>
</body></html>
