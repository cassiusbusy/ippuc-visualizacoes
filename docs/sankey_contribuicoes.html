var MINUTA = JSON.parse(document.getElementById('data-minuta').textContent);
var SURL = document.getElementById('data-surl').textContent.trim().replace(/^"|"$/g,'');
var VURL = document.getElementById('data-vurl').textContent.trim().replace(/^"|"$/g,'');
var mapVotos = {}; // id_estrutura -> {adequado, precisa, total}
var DEF_ETAPA = 'etapa2';
var DEF_OFICINA = 'Desafios Preliminares Ippuc';
var DEF_TITULO = 'T1';
var buscaTexto = '';
var COR_CONTRIB = '#CA6673';
var COR_NIV = {1:'#555',2:'#777',3:'#999',4:'#bbb'};
var ALT_NIV = {1:44,2:36,3:30,4:26,contrib:54};
var IND_NIV = {1:0,2:14,3:28,4:40};
var GAP_CONTRIB = 8, GAP_MINUTA = 5;
var NODE_W_C = 500, NODE_W_M = 340;
var COL_GAP = 100, PAD = 20;

var todosRows=[], etapas=[], oficPorEtapa={};
var mapM={};
MINUTA.minuta.forEach(function(n){ mapM[n.id]=n; });

function nc(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''); }

function parseCSV(txt){
  var rows=[],cur='',inQ=false,fields=[],i=0;
  while(i<txt.length){
    var ch=txt[i];
    if(ch==='"'){if(inQ&&txt[i+1]==='"'){cur+='"';i+=2;continue;}inQ=!inQ;i++;continue;}
    if(ch===','&&!inQ){fields.push(cur);cur='';i++;continue;}
    if(ch==='\n'&&!inQ){fields.push(cur);cur='';rows.push(fields);fields=[];i++;continue;}
    if(ch==='\r'){i++;continue;}
    cur+=ch;i++;
  }
  if(cur||fields.length){fields.push(cur);rows.push(fields);}
  if(rows.length<2)return[];
  var raw=rows[0].map(function(h){return h.trim().replace(/^"|"$/g,'');});
  var norm=raw.map(nc);
  var iC=norm.findIndex(function(h){return h.includes('cdigo')||h==='codigo';});
  var iP=norm.findIndex(function(h){return h.includes('proposta');});
  var iF=norm.findIndex(function(h){return h==='fonte';});
  var iO=norm.findIndex(function(h){return h.includes('oficina');});
  console.log('Headers:',raw,'iC:',iC,'iP:',iP,'iF:',iF,'iO:',iO);
  return rows.slice(1).filter(function(r){return r.length>1;}).map(function(v){
    function g(i){return i>=0?(v[i]||'').trim().replace(/^"|"$/g,''):'';};
    return{codigo:g(iC),proposta:g(iP),fonte:g(iF)||'outros',oficina:g(iO)};
  });
}

function resolverCod(cod){
  if(!cod)return null;
  if(mapM[cod])return cod;
  var partes=cod.split('-');
  for(var i=partes.length-1;i>0;i--){
    var pai=partes.slice(0,i).join('-');
    if(mapM[pai])return pai;
  }
  return null;
}

var NUMERAIS = ['','I','II','III','IV','V','VI','VII','VIII','IX','X'];

function labelCodigo(cod){
  if(!cod||!mapM[cod])return cod||'';
  var no=mapM[cod];
  var partes=cod.split('-');
  // Numero romano do titulo
  var tNum=parseInt(partes[0].replace('T',''))||0;
  var tRom=NUMERAIS[tNum]||tNum;
  var tNome='Titulo '+tRom;
  // Nome do nivel classificado (o proprio no)
  var nomeNivel=no.nome;
  // Montar label: "Titulo III — Nome do nivel classificado"
  if(no.nivel===1) return tNome+' — '+nomeNivel;
  return tNome+' — '+nomeNivel;
}

async function carregar(){
  try{
    var r=await fetch(SURL);
    if(!r.ok)throw new Error('HTTP '+r.status);
    todosRows=parseCSV(await r.text()).filter(function(r){return r.codigo&&r.codigo!=='nan';});
    console.log('Rows:',todosRows.length);
    etapas=[...new Set(todosRows.map(function(r){return r.fonte;}))].sort();
    etapas.forEach(function(e){
      oficPorEtapa[e]=[...new Set(todosRows.filter(function(r){return r.fonte===e;}).map(function(r){return r.oficina;}).filter(function(o){return o&&o!=='nan'&&o!=='';  }))].sort();
    });
    var selE=document.getElementById('sel-etapa');
    selE.innerHTML='';
    etapas.forEach(function(e){var o=document.createElement('option');o.value=e;o.textContent=e;selE.appendChild(o);});
    if(etapas.includes(DEF_ETAPA)){selE.value=DEF_ETAPA;popularOficinas(DEF_ETAPA,DEF_OFICINA);}
    else{selE.value=etapas[0];popularOficinas(etapas[0]);}
    // Carregar votos em paralelo (não bloqueia se falhar)
    fetch(VURL).then(function(rv){ return rv.text(); }).then(function(vtxt){
      var vrows=[], vcur='',vinQ=false,vfields=[],vi=0;
      while(vi<vtxt.length){
        var vch=vtxt.charCodeAt(vi);
        var vchStr=vtxt[vi];
        if(vchStr==='"'){if(vinQ&&vtxt[vi+1]==='"'){vcur+='"';vi+=2;continue;}vinQ=!vinQ;vi++;continue;}
        if(vchStr===','&&!vinQ){vfields.push(vcur);vcur='';vi++;continue;}
        if(vch===10&&!vinQ){vfields.push(vcur);vcur='';vrows.push(vfields);vfields=[];vi++;continue;}
        if(vch===13){vi++;continue;}
        vcur+=vchStr;vi++;
      }
      if(vcur||vfields.length){vfields.push(vcur);vrows.push(vfields);}
      if(vrows.length<2)return;
      var vh=vrows[0].map(function(h){return h.trim().replace(/^"|"$/g,'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9_]/g,'');});
      var viId=vh.findIndex(function(h){return h.includes('estrutura')||h.includes('codigo')||h==='id';});
      var viV=vh.findIndex(function(h){return h==='voto'||h.includes('voto');});
      console.log('Votos headers:',vrows[0],'viId:',viId,'viV:',viV);
      var tmpVotos={};
      vrows.slice(1).forEach(function(v){
        function g(i){return i>=0?(v[i]||'').trim().replace(/^"|"$/g,''):'';}
        var id=g(viId); if(!id)return;
        var voto=g(viV).toLowerCase();
        if(!tmpVotos[id])tmpVotos[id]={adequado:0,precisa:0};
        if(voto.includes('adequado'))tmpVotos[id].adequado++;
        else if(voto.includes('precisa')||voto.includes('ajuste'))tmpVotos[id].precisa++;
      });
      Object.keys(tmpVotos).forEach(function(id){
        var v=tmpVotos[id];
        mapVotos[id]={adequado:v.adequado,precisa:v.precisa,total:v.adequado+v.precisa};
        var partes=id.split('-');
        for(var pi=1;pi<partes.length;pi++){
          var pai=partes.slice(0,pi).join('-');
          if(!mapVotos[pai])mapVotos[pai]={adequado:0,precisa:0,total:0};
          mapVotos[pai].adequado+=v.adequado;
          mapVotos[pai].precisa+=v.precisa;
          mapVotos[pai].total+=v.adequado+v.precisa;
        }
      });
      console.log('Votos carregados:',Object.keys(mapVotos).length);
      // Redesenhar se já houver seleção ativa
      var etapa=document.getElementById('sel-etapa').value;
      var oficina=document.getElementById('sel-oficina').value;
      if(etapa&&oficina) desenhar();
    }).catch(function(e){console.warn('Votos nao carregados:',e.message);});

    document.getElementById('loading-msg').style.display='none';
  }catch(e){
    console.error(e);
    document.getElementById('loading-msg').innerHTML='<span style="color:#CA6673">Erro: '+e.message+'</span>';
  }
}

function popularOficinas(etapa,selecionar){
  var selO=document.getElementById('sel-oficina');
  selO.innerHTML='<option value="">Selecione uma oficina</option>';
  var ofs=oficPorEtapa[etapa]||[];
  ofs.forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;selO.appendChild(op);});
  if(selecionar&&ofs.includes(selecionar)){selO.value=selecionar;desenhar();}
  else{document.getElementById('empty-msg').style.display='block';document.getElementById('sankey-wrap').style.display='none';}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function desenhar(){
  var etapa=document.getElementById('sel-etapa').value;
  var oficina=document.getElementById('sel-oficina').value;
  var tituloF=document.getElementById('sel-titulo').value;
  if(!oficina)return;

  var rows=todosRows.filter(function(r){
    return r.fonte===etapa&&r.oficina===oficina;
  });

  // Filtrar por título se selecionado
  if(tituloF){
    rows=rows.filter(function(r){
      var cod=resolverCod(r.codigo);
      return cod&&cod.split('-')[0]===tituloF;
    });
  }
  if(buscaTexto){
    rows=rows.filter(function(r){
      return (r.proposta||'').toLowerCase().includes(buscaTexto)||
             (r.codigo||'').toLowerCase().includes(buscaTexto);
    });
  }

  if(rows.length===0){
    document.getElementById('empty-msg').textContent='Nenhuma contribuicao encontrada para esta selecao.';
    document.getElementById('empty-msg').style.display='block';
    document.getElementById('sankey-wrap').style.display='none';
    return;
  }
  document.getElementById('empty-msg').style.display='none';
  document.getElementById('sankey-wrap').style.display='block';
  document.getElementById('card-titulo').textContent='Fluxo: '+etapa+' / '+oficina+(tituloF?' / '+tituloF:'')+' ('+rows.length+' contrib.)';
  document.getElementById('busca-count').textContent=buscaTexto&&rows.length>0?rows.length+' resultado'+(rows.length!==1?'s':''):'';

  // Resolver hierarquia para cada contribuição
  var contribs=rows.map(function(r,i){
    var cod=resolverCod(r.codigo);
    return{id:'c'+i,texto:r.proposta,codigo:cod};
  });

  // Construir lista ordenada de nós da minuta referenciados
  // Ordem: para cada contrib, pegar título→cap→sec→sub
  var minutaOrdem=[];
  var minutaVisto=new Set();
  contribs.forEach(function(c){
    if(!c.codigo)return;
    var partes=c.codigo.split('-');
    var nivMax=mapM[c.codigo]?mapM[c.codigo].nivel:partes.length;
    // Adicionar cada ancestral em ordem hierárquica
    for(var n=1;n<=nivMax;n++){
      var id=partes.slice(0,n).join('-');
      if(mapM[id]&&!minutaVisto.has(id)){
        minutaVisto.add(id);
        minutaOrdem.push(mapM[id]);
      }
    }
  });

  // Calcular alturas
  var hC=contribs.reduce(function(s,c){var nL=c.texto.length>120?3:c.texto.length>60?2:1;return s+(nL===3?58:nL===2?44:32)+GAP_CONTRIB;},0)-GAP_CONTRIB;
  var hM=0;
  minutaOrdem.forEach(function(n){hM+=ALT_NIV[n.nivel]+GAP_MINUTA;});
  hM-=GAP_MINUTA;

  var svgH=Math.max(hC,hM,300)+PAD*2;
  var xC=PAD, xM=PAD+NODE_W_C+COL_GAP;
  var svgW=xM+NODE_W_M+PAD;

  // Posições Y
  var yC=PAD+(svgH-PAD*2-hC)/2;
  // Calcular altura dinâmica por contrib baseada no texto
  var posC=[];
  var yCacc=yC;
  contribs.forEach(function(c,i){
    var nL=c.texto.length>120?3:c.texto.length>60?2:1;
    var h=nL===3?58:nL===2?44:32;
    posC.push(Object.assign({},c,{py:yCacc,h:h}));
    yCacc+=h+GAP_CONTRIB;
  });

  var yM=PAD+(svgH-PAD*2-hM)/2;
  // Contar contribuições por nó da minuta (considerando filtro ativo)
  var contPorNo={};
  contribs.forEach(function(c){
    if(!c.codigo)return;
    var partes=c.codigo.split('-');
    var nivMax=mapM[c.codigo]?mapM[c.codigo].nivel:partes.length;
    for(var n=1;n<=nivMax;n++){
      var id=partes.slice(0,n).join('-');
      contPorNo[id]=(contPorNo[id]||0)+1;
    }
  });

  var posM=[];
  var yAcc=yM;
  minutaOrdem.forEach(function(n){
    posM.push({id:n.id,nome:n.nome,nivel:n.nivel,tipo:n.tipo,py:yAcc,h:ALT_NIV[n.nivel],cont:contPorNo[n.id]||0});
    yAcc+=ALT_NIV[n.nivel]+GAP_MINUTA;
  });

  // Mapa id→py para links
  var mapPY={};
  posM.forEach(function(n){mapPY[n.id]=n.py;});

  var out=[];
  out.push('<svg width="'+svgW+'" height="'+svgH+'" xmlns="http://www.w3.org/2000/svg">');

  // Cabeçalhos
  out.push('<text x="'+(xC+NODE_W_C/2)+'" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#aaa" letter-spacing="1">CONTRIBUICOES</text>');
  out.push('<text x="'+(xM+NODE_W_M/2)+'" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#aaa" letter-spacing="1">MINUTA DO PLANO DIRETOR</text>');

  // Links: contrib → nó classificado
  posC.forEach(function(c){
    if(!c.codigo||mapPY[c.codigo]===undefined)return;
    var y1=c.py+c.h/2, y2=mapPY[c.codigo]+ALT_NIV[mapM[c.codigo]?mapM[c.codigo].nivel:3]/2;
    var mx=(xC+NODE_W_C+xM)/2;
    out.push('<path d="M'+(xC+NODE_W_C)+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+xM+','+y2+'" fill="none" stroke="'+COR_CONTRIB+'" stroke-width="1" stroke-opacity="0.3"/>');
  });

  // Nós contribuições
  posC.forEach(function(c){
    var full=esc(c.texto);
    var cod=esc(c.codigo||'');
    var txt=c.texto;
    var L1=esc(txt.slice(0,60));
    var L2=txt.length>60?esc(txt.slice(60,120)):'';
    var L3=txt.length>120?esc(txt.slice(120,180)+(txt.length>180?'...':'')):'';
    var nLines=L3?3:L2?2:1;
    var nodeH=nLines===3?58:nLines===2?44:32;
    var baseY=c.py+nodeH/2-(nLines-1)*8;
    out.push('<g class="nc" data-full="'+full+'" data-cod="'+cod+'">');
    out.push('<rect x="'+xC+'" y="'+c.py+'" width="'+NODE_W_C+'" height="'+nodeH+'" rx="4" fill="'+COR_CONTRIB+'" fill-opacity=".82"/>');
    out.push('<text x="'+(xC+10)+'" font-size="10" fill="white">');
    out.push('<tspan x="'+(xC+10)+'" y="'+(baseY)+'" >'+L1+'</tspan>');
    if(L2)out.push('<tspan x="'+(xC+10)+'" dy="16">'+L2+'</tspan>');
    if(L3)out.push('<tspan x="'+(xC+10)+'" dy="16">'+L3+'</tspan>');
    out.push('</text></g>');
  });

  // Nós minuta com indentação e tamanho por nível
  posM.forEach(function(n){
    var ind=IND_NIV[n.nivel]||0;
    var cor=COR_NIV[n.nivel]||'#999';
    var w=NODE_W_M-ind;
    var fs=n.nivel===1?11:n.nivel===2?10:9;
    var fw=n.nivel<=2?'700':'500';
    var label=n.tipo+' — '+n.nome;
    var short=esc(label.slice(0,38)+(label.length>38?'...':''));
    var full=esc(n.nome);
    var votos=mapVotos[n.id]||null;
    var vtot=votos?votos.total:0;
    var vadq=votos?votos.adequado:0;
    var vprec=votos?votos.precisa:0;
    out.push('<g class="nm" data-id="'+n.id+'" data-full="'+full+'" data-vtot="'+vtot+'" data-adq="'+vadq+'" data-prec="'+vprec+'">');
    out.push('<rect x="'+(xM+ind)+'" y="'+n.py+'" width="'+w+'" height="'+n.h+'" rx="4" fill="'+cor+'" fill-opacity=".85"/>');
    out.push('<text x="'+(xM+ind+8)+'" y="'+(n.py+n.h/2)+'" dominant-baseline="middle" font-size="'+fs+'" font-weight="'+fw+'" fill="white">'+short+'</text>');
    if(votos&&votos.total>0){
      var barX=xM+ind+4, barY=n.py+n.h-7, barW=w-8, barH=4;
      var pAdq=votos.adequado/votos.total;
      var wAdq=Math.round(barW*pAdq);
      var wPrec=barW-wAdq;
      out.push('<rect x="'+barX+'" y="'+barY+'" width="'+barW+'" height="'+barH+'" rx="2" fill="rgba(0,0,0,0.2)"/>');
      if(wAdq>0)out.push('<rect x="'+barX+'" y="'+barY+'" width="'+wAdq+'" height="'+barH+'" rx="2" fill="#00a859" fill-opacity=".9"/>');
      if(wPrec>0)out.push('<rect x="'+(barX+wAdq)+'" y="'+barY+'" width="'+wPrec+'" height="'+barH+'" fill="#F07E31" fill-opacity=".9"/>');
    }
    out.push('</g>');
  });

  out.push('</svg>');
  document.getElementById('sankey-wrap').innerHTML=out.join('');

  // Tooltip
  var ttp=document.getElementById('ttp');
  document.querySelectorAll('.nc').forEach(function(el){
    el.addEventListener('mouseenter',function(e){
      ttp.innerHTML='<span style="color:#e8a0a8;font-weight:600">Clique para ver completo</span>';
      ttp.style.left=(e.clientX+14)+'px';ttp.style.top=(e.clientY-10)+'px';ttp.classList.add('vis');
    });
    el.addEventListener('mouseleave',function(){ttp.classList.remove('vis');});
    el.addEventListener('mousemove',function(e){ttp.style.left=(e.clientX+14)+'px';ttp.style.top=(e.clientY-10)+'px';});
    el.addEventListener('click',function(){
      ttp.classList.remove('vis');
      document.getElementById('ibox-titulo').textContent='Contribuicao';
      var codLabel=el.dataset.cod?labelCodigo(el.dataset.cod):'';
      document.getElementById('ibox-pills').innerHTML=
        (el.dataset.cod?'<span class="mpill" style="background:#eef2ff;color:var(--az)">'+el.dataset.cod+'</span>':'')
        +(codLabel?'<span class="mpill" style="background:#f3f3f3;color:#444">'+codLabel+'</span>':'')
        +'<span class="mpill" style="background:#fdeef0;color:var(--bordo)">'+document.getElementById('sel-etapa').value+'</span>'
        +'<span class="mpill" style="background:#f3f3f3;color:#666">'+document.getElementById('sel-oficina').value+'</span>';
      document.getElementById('ibox-txt').textContent=el.dataset.full;
      document.getElementById('ibox').classList.add('vis');
      document.getElementById('ibox').scrollIntoView({behavior:'smooth',block:'nearest'});
    });
  });
  document.querySelectorAll('.nm').forEach(function(el){
    el.addEventListener('mouseenter',function(e){
      var n=mapM[el.dataset.id];if(!n)return;
      var cont=parseInt(el.dataset.cont)||0;
      var vtot=parseInt(el.dataset.vtot)||0;
      var adq=parseInt(el.dataset.adq)||0;
      var prec=parseInt(el.dataset.prec)||0;
      var votosHtml='';
      if(vtot>0){
        votosHtml='<br><span style="color:#00a859;font-weight:600">✓ '+adq+' adequado'+(adq!==1?'s':'')+'</span>'
          +' <span style="color:#F07E31;font-weight:600">⚠ '+prec+' precisa ajuste</span>';
      }
      ttp.innerHTML='<strong style="color:#ddd">'+n.tipo+'</strong><br>'+el.dataset.full
        +'<br><span style="color:#aaa;font-size:.67rem">ID: '+n.id+'</span>'
        +(cont?'<br><span style="color:#CA6673;font-weight:600">'+cont+' contribuicao'+(cont!==1?'s':'')+ ' neste filtro</span>':'')
        +votosHtml;
      ttp.style.left=(e.clientX+14)+'px';ttp.style.top=(e.clientY-10)+'px';ttp.classList.add('vis');
    });
    el.addEventListener('mouseleave',function(){ttp.classList.remove('vis');});
    el.addEventListener('mousemove',function(e){ttp.style.left=(e.clientX+14)+'px';ttp.style.top=(e.clientY-10)+'px';});
  });
}

document.getElementById('sel-etapa').addEventListener('change',function(){popularOficinas(this.value);});
document.getElementById('sel-oficina').addEventListener('change',function(){desenhar();});
document.getElementById('sel-titulo').addEventListener('change',function(){desenhar();});
carregar();

// ── BUSCA SANKEY ────────────────────────────────────────────────────────
function aplicarBusca(){
  buscaTexto=document.getElementById('busca-inp').value.trim().toLowerCase();
  document.getElementById('busca-clear').classList.toggle('vis',buscaTexto.length>0);
  var etapa=document.getElementById('sel-etapa').value;
  var oficina=document.getElementById('sel-oficina').value;
  if(etapa&&oficina)desenhar();
  else{
    document.getElementById('busca-count').textContent='';
  }
}
function limparBusca(){
  document.getElementById('busca-inp').value='';
  aplicarBusca();
}
document.getElementById('busca-inp').addEventListener('input',aplicarBusca);
document.getElementById('busca-inp').addEventListener('keydown',function(e){if(e.key==='Escape')limparBusca();});
</script></body></html>
