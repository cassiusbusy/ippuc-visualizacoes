<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Fluxo Contribuições - Plano Diretor Curitiba</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');
        :root{--v:#00a859;--vl:#e6f7ee;--az:#447EC0;--azd:#1a3a5c;--bordo:#CA6673;--bg:#fff;--cd:#f3f3f3;--bd:#e2e4e8;--tx:#1a1a2e;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;}
        .stripe{height:5px;display:flex;}.stripe div{flex:1;}
        .cnt{max-width:1450px;margin:0 auto;padding:20px;}
        .ptitle{font-size:1.1rem;font-weight:700;color:var(--azd);margin-bottom:4px;}
        .psub{font-size:.8rem;color:#888;margin-bottom:14px;}
        .back{display:inline-flex;align-items:center;gap:6px;color:var(--az);font-size:.78rem;font-weight:500;text-decoration:none;margin-bottom:12px;}
        .card{background:var(--cd);border-radius:10px;padding:16px;border:.5px solid var(--bd);margin-bottom:10px;}
        .card h3{font-size:.76rem;font-weight:700;color:var(--azd);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}
        .filtros-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
        .filtro-g{display:flex;flex-direction:column;gap:4px;flex:1;min-width:160px;}
        .filtro-g label{font-size:.68rem;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
        select{border:1.5px solid var(--bd);border-radius:8px;padding:7px 10px;font-size:.78rem;font-family:Roboto,sans-serif;background:#fff;color:var(--tx);outline:none;cursor:pointer;width:100%;}
        select:focus{border-color:var(--v);}
        .loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:#888;font-size:.85rem;}
        .spinner{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--bordo);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty{text-align:center;padding:60px;color:#aaa;font-size:.85rem;display:none;}
        #sankey-wrap{overflow-x:auto;margin-top:4px;}
        .tooltip{position:fixed;background:rgba(26,26,46,.95);color:#fff;border-radius:8px;padding:10px 14px;font-size:.75rem;line-height:1.5;max-width:340px;pointer-events:none;z-index:500;display:none;box-shadow:0 4px 16px rgba(0,0,0,.25);}
        .tooltip.vis{display:block;}
        .busca-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
        .busca-input{flex:1;border:1.5px solid var(--bd);border-radius:8px;padding:7px 12px;font-size:.8rem;outline:none;background:#fff;color:var(--tx);}
        .busca-input:focus{border-color:var(--v);}
        .busca-clear{background:var(--cd);border:none;border-radius:6px;padding:5px 10px;font-size:.72rem;cursor:pointer;color:#666;display:none;}
        .busca-clear.vis{display:block;}
        .ibox{background:#fff;border-radius:9px;padding:12px 14px;border:.5px solid var(--bd);margin-bottom:10px;display:none;position:relative;}
        .ibox.vis{display:block;}
        .ibox-close{position:absolute;top:8px;right:8px;background:var(--cd);border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:.8rem;color:#555;}
        .mpill{border-radius:7px;padding:2px 8px;font-size:.67rem;font-weight:600;display:inline-block;margin:2px;}
        .pag-wrap{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;background:var(--cd);border-radius:10px;padding:10px 16px;border:.5px solid var(--bd);}
        .pag-btn{background:#fff;border:1.5px solid var(--bd);padding:6px 16px;border-radius:7px;cursor:pointer;font-size:.75rem;font-weight:600;color:var(--azd);transition:all .15s;}
        .pag-btn:hover:not(:disabled){background:var(--vl);border-color:var(--v);color:var(--v);}
        .pag-btn:disabled{opacity:.35;cursor:not-allowed;}
        .pag-info{font-size:.78rem;font-weight:700;color:#444;}
        .pag-total{font-size:.72rem;color:#888;}
    </style>
</head>

<div class="stripe">
    <div style="background:#00a859"></div><div style="background:#447EC0"></div>
    <div style="background:#8E6CAD"></div><div style="background:#8EC899"></div>
    <div style="background:#FDC533"></div><div style="background:#F07E31"></div>
    <div style="background:#EA535E"></div><div style="background:#CA6673"></div>
</div>

<div class="cnt">

    <div class="ptitle">Fluxo de Contribuições — Análise Parcial do Plano Diretor Curitiba</div>

    <div class="card">

            </div>
            <div class="filtro-g">
                <label>Oficina</label>
                <select id="sel-oficina"><option value="">Selecione a etapa primeiro</option></select>
            </div>
            <div class="filtro-g">
                <label>Título da Minuta</label>
                <select id="sel-titulo">
                    <option value="">Todos os títulos</option>
                    <option value="T1">T1 — DO DESENVOLVIMENTO URBANO SUSTENTÁVEL</option>
                    <option value="T2">T2 — DA INTEGRAÇÃO METROPOLITANA</option>
                    <option value="T3">T3 — DA POLÍTICA TERRITORIAL INTEGRADA</option>
                    <option value="T4">T4 — DA ARTICULAÇÃO DE POLÍTICAS PÚBLICAS NO TERRITÓRIO</option>
                    <option value="T5">T5 — DOS INSTRUMENTOS DA POLÍTICA TERRITORIAL INTEGRADA</option>

            </div>
        </div>
    </div>

    <div class="ibox" id="ibox">
        <button class="ibox-close" onclick="document.getElementById('ibox').classList.remove('vis')">&#10005;</button>
        <div style="font-size:.88rem;font-weight:700;color:var(--bordo);margin-bottom:6px;">Contribuição completa</div>
        <div style="font-size:.82rem;color:#333;line-height:1.7;" id="ibox-txt"></div>
    </div>

    <div class="busca-wrap">
        <input class="busca-input" id="busca-inp" type="text" placeholder="Buscar por texto da contribuição...">
        <button class="busca-clear" id="busca-clear" onclick="limparBusca()">✕ Limpar</button>
    </div>

    <div class="pag-wrap" id="pag-wrap" style="display:none;">
        <button class="pag-btn" id="btn-ant" onclick="mudarPagina(-1)">← Anterior</button>
        <div style="text-align:center;">
            <div class="pag-info" id="pag-info">Página 1 de 1</div>
            <div class="pag-total" id="pag-total"></div>
        </div>
        <button class="pag-btn" id="btn-prox" onclick="mudarPagina(1)">Próxima →</button>
    </div>

    <div class="card">
        <h3 id="card-titulo">Fluxo</h3>
        <div id="loading-msg" class="loading"><div class="spinner"></div><span>Carregando dados...</span></div>
        <div id="empty-msg" class="empty">Selecione etapa e oficina para visualizar.</div>
        <div id="sankey-wrap" style="display:none;"></div>
    </div>
</div>

<script>

var COR_CONTRIB  = '#CA6673';

var ALT_NIV      = {1:44, 2:36, 3:30, 4:26};
var IND_NIV      = {1:0,  2:14, 3:28, 4:40};

var NODE_W_M     = 450;
var COL_GAP      = 120;
var PAD          = 20;
var GAP_CONTRIB  = 7;
var CHARS_POR_LINHA = 82;      // chars antes de quebrar linha
var LINHA_H      = 16;         // altura por linha de texto
var PAD_TOPO_TEXTO = 20;       // distância do topo da caixa ao primeiro texto
var PAD_V_CAIXA  = 12;         // padding vertical extra na caixa

MINUTA.minuta.forEach(function(n){ mapM[n.id] = n; });

// ── Utilitários ─────────────────────────────────────────────────────────────
function nc(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''); }

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Word-wrap: divide texto em array de linhas com no máx CHARS_POR_LINHA chars
function wrapTexto(texto){
    var palavras = texto.split(' ');
    var linhas = [], linha = '';
    palavras.forEach(function(p){
        if((linha + (linha ? ' ' : '') + p).length <= CHARS_POR_LINHA){
            linha += (linha ? ' ' : '') + p;
        } else {
            if(linha) linhas.push(linha);
            // palavra maior que o limite: divide forçado
            while(p.length > CHARS_POR_LINHA){
                linhas.push(p.slice(0, CHARS_POR_LINHA));
                p = p.slice(CHARS_POR_LINHA);
            }
            linha = p;
        }
    });
    if(linha) linhas.push(linha);
    return linhas;
}

// Altura da caixa para um texto
function alturaContrib(texto){
    var linhas = wrapTexto(texto);
    return linhas.length * LINHA_H + PAD_TOPO_TEXTO + PAD_V_CAIXA;
}

function resolverCod(cod){
    if(!cod) return null;
    if(mapM[cod]) return cod;
    var p = cod.split('-');
    for(var i = p.length-1; i > 0; i--){
        var pai = p.slice(0,i).join('-');
        if(mapM[pai]) return pai;
    }
    return null;
}

// ── CSV Parse Robusto ────────────────────────────────────────────────────────
function parseCSV(txt){
    var rows=[], cur='', inQ=false, fields=[], i=0;
    while(i < txt.length){
        var ch = txt[i];
        if(ch === '"'){ if(inQ && txt[i+1]==='"'){cur+='"';i+=2;continue;} inQ=!inQ; i++; continue; }
        if(ch === ',' && !inQ){ fields.push(cur); cur=''; i++; continue; }
        if(txt.charCodeAt(i) === 10 && !inQ){ fields.push(cur); cur=''; rows.push(fields); fields=[]; i++; continue; }
        if(txt.charCodeAt(i) === 13){ i++; continue; }  // FIX: trata \r
        cur += ch; i++;
    }
    if(cur || fields.length){ fields.push(cur); rows.push(fields); }
    if(rows.length < 2) return [];
    var norm = rows[0].map(nc);
    var iC = norm.findIndex(function(h){ return h.includes('cdigo') || h==='codigo'; });
    var iP = norm.findIndex(function(h){ return h.includes('proposta'); });
    var iF = norm.findIndex(function(h){ return h==='fonte'; });
    var iO = norm.findIndex(function(h){ return h.includes('oficina'); });
    return rows.slice(1).filter(function(v){ return v.length > 1; }).map(function(v){
        function g(idx){ return idx>=0 ? (v[idx]||'').trim().replace(/^"|"$/g,'') : ''; }
        return { codigo:g(iC), proposta:g(iP), fonte:g(iF)||'outros', oficina:g(iO) };
    });
}

// ── Votos ────────────────────────────────────────────────────────────────────
// Integrada a lógica forte de parser do sankey contribuições para não quebrar a leitura
async function carregarVotos(){
    try{
        var resp = await fetch(VURL);
        var vtxt = await resp.text();
        
        var vrows=[], vcur='',vinQ=false,vfields=[],vi=0;
        while(vi<vtxt.length){
            var vch=vtxt.charCodeAt(vi);
            var vchStr=vtxt[vi];
            if(vchStr==='"'){if(vinQ&&vtxt[vi+1]==='"'){vcur+='"';vi+=2;continue;}vinQ=!vinQ;vi++;continue;}
            if(vchStr===','&&!vinQ){vfields.push(vcur);vcur='';vi++;continue;}
            if(vch===10&&!vinQ){vfields.push(vcur);vcur='';vrows.push(vfields);vfields=[];vi++;continue;}
            if(vch===13){vi++;continue;}
            vcur+=vchStr;vi++;
        }
        if(vcur||vfields.length){vfields.push(vcur);vrows.push(vfields);}
        if(vrows.length<2)return;
        
        var vh=vrows[0].map(function(h){return h.trim().replace(/^"|"$/g,'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9_]/g,'');});
        var viId=vh.findIndex(function(h){return h.includes('estrutura')||h.includes('codigo')||h==='id';});
        var viV=vh.findIndex(function(h){return h==='voto'||h.includes('voto');});
        
        var tmpVotos={};
        vrows.slice(1).forEach(function(v){
            function g(i){return i>=0?(v[i]||'').trim().replace(/^"|"$/g,''):'';}
            var id=g(viId); if(!id)return;
            var voto=g(viV).toLowerCase();
            if(!tmpVotos[id])tmpVotos[id]={adequado:0,precisa:0};
            if(voto.includes('adequado'))tmpVotos[id].adequado++;
            else if(voto.includes('precisa')||voto.includes('ajuste'))tmpVotos[id].precisa++;
        });
        
        Object.keys(tmpVotos).forEach(function(id){
            var v=tmpVotos[id];
            mapVotos[id]={adequado:v.adequado,precisa:v.precisa,total:v.adequado+v.precisa};
            var partes=id.split('-');
            for(var pi=1;pi<partes.length;pi++){
                var pai=partes.slice(0,pi).join('-');
                if(!mapVotos[pai])mapVotos[pai]={adequado:0,precisa:0,total:0};
                mapVotos[pai].adequado+=v.adequado;
                mapVotos[pai].precisa+=v.precisa;
                mapVotos[pai].total+=v.adequado+v.precisa;
            }
        });
    } catch(e){ console.warn('Votos não carregados:', e.message); }
}

// ── Carga principal ───────────────────────────────────────────────────────────
async function carregar(){
    await carregarVotos();
    try{
        var r = await fetch(SURL);
        todosRows = parseCSV(await r.text()).filter(function(r){ return r.codigo && r.codigo !== 'nan'; });
        etapas = [...new Set(todosRows.map(function(r){ return r.fonte; }))].sort();
        etapas.forEach(function(e){
            oficPorEtapa[e] = [...new Set(
                todosRows.filter(function(r){ return r.fonte===e; }).map(function(r){ return r.oficina; })
            )].filter(function(o){ return o && o!=='nan' && o!==''; }).sort();
        });
        var selE = document.getElementById('sel-etapa');
        selE.innerHTML = etapas.map(function(e){ return '<option value="'+e+'">'+e+'</option>'; }).join('');

        // Defaults: etapa3 / Site Minuta Interativa
        var defEtapa = etapas.includes('etapa3') ? 'etapa3' : etapas[0];
        selE.value = defEtapa;
        popularOficinas(defEtapa, 'Site Minuta Interativa');

        document.getElementById('loading-msg').style.display = 'none';
    } catch(e){
        console.error(e);
        document.getElementById('loading-msg').innerHTML = '<span style="color:#CA6673">Erro ao carregar: '+e.message+'</span>';
    }
}

function popularOficinas(etapa, selecionar){
    var selO = document.getElementById('sel-oficina');
    var ofs  = oficPorEtapa[etapa] || [];
    selO.innerHTML = ofs.map(function(o){ return '<option value="'+o+'">'+o+'</option>'; }).join('');
    if(selecionar && ofs.includes(selecionar)) selO.value = selecionar;
    paginaAtual = 0;
    desenhar();
}

// ── Desenhar ─────────────────────────────────────────────────────────────────
function desenhar(){
    var etapa   = document.getElementById('sel-etapa').value;
    var oficina = document.getElementById('sel-oficina').value;
    var tituloF = document.getElementById('sel-titulo').value;
    if(!oficina) return;

    // Filtros
    var filtrado = todosRows.filter(function(r){ return r.fonte===etapa && r.oficina===oficina; });
    if(tituloF) filtrado = filtrado.filter(function(r){ return (resolverCod(r.codigo)||'').split('-')[0] === tituloF; });
    if(buscaTexto) filtrado = filtrado.filter(function(r){ return (r.proposta||'').toLowerCase().includes(buscaTexto); });

    var total    = filtrado.length;
    var totalPag = Math.max(1, Math.ceil(total / POR_PAGINA));
    paginaAtual  = Math.min(paginaAtual, totalPag - 1);
    paginaAtual  = Math.max(0, paginaAtual);

    // Atualizar UI de paginação
    var pagWrap = document.getElementById('pag-wrap');
    pagWrap.style.display = total > 0 ? 'flex' : 'none';
    document.getElementById('pag-info').textContent  = 'Página ' + (paginaAtual+1) + ' de ' + totalPag;
    document.getElementById('pag-total').textContent = total + ' contribuições encontradas';
    document.getElementById('btn-ant').disabled  = paginaAtual === 0;
    document.getElementById('btn-prox').disabled = paginaAtual >= totalPag - 1;

    var rows = filtrado.slice(paginaAtual * POR_PAGINA, (paginaAtual+1) * POR_PAGINA);

    // Label do card
    var label = etapa + ' / ' + oficina + (tituloF ? ' / ' + tituloF : '');
    document.getElementById('card-titulo').textContent = 'Fluxo: ' + label + ' (' + total + ' contrib. · pág. ' + (paginaAtual+1) + '/' + totalPag + ')';

    if(rows.length === 0){
        document.getElementById('sankey-wrap').style.display = 'none';
        document.getElementById('empty-msg').style.display   = 'block';
        return;
    }
    document.getElementById('empty-msg').style.display   = 'none';
    document.getElementById('sankey-wrap').style.display = 'block';

    // ── PASSO 1: calcular word-wrap e alturas ANTES de qualquer posição ──────
    var contribs = rows.map(function(r, i){
        var cod    = resolverCod(r.codigo);
        var linhas = wrapTexto(r.proposta || '');
        var h      = linhas.length * LINHA_H + PAD_TOPO_TEXTO + PAD_V_CAIXA;
        return { id:'c'+i, texto:r.proposta, codigo:cod, linhas:linhas, h:h };
    });

    // ── PASSO 2: calcular posições Y com alturas reais ───────────────────────
    var yC = PAD + 24;   // 24 = espaço do cabeçalho "CONTRIBUIÇÕES"
    contribs.forEach(function(c){
        c.py = yC;
        yC  += c.h + GAP_CONTRIB;
    });

    // ── PASSO 3: nós da minuta referenciados (ordem hierárquica) ────────────
    var minutaVisto = new Set();
    var minutaOrdem = [];
    contribs.forEach(function(c){
        if(!c.codigo) return;
        var partes = c.codigo.split('-');
        for(var n=1; n<=partes.length; n++){
            var id = partes.slice(0,n).join('-');
            if(mapM[id] && !minutaVisto.has(id)){ minutaVisto.add(id); minutaOrdem.push(mapM[id]); }
        }
    });

    // ── PASSO 4: posições Y dos nós da minuta ───────────────────────────────
    var mapPY  = {};
    var yMAcc  = PAD + 24;
    minutaOrdem.forEach(function(n){
        mapPY[n.id] = yMAcc;
        yMAcc += ALT_NIV[n.nivel] + 5;
    });

    var svgH   = Math.max(yC, yMAcc, 300) + PAD;
    var xC     = PAD;
    var xM     = PAD + NODE_W_C + COL_GAP;
    var svgW   = xM + NODE_W_M + PAD;

    var out = ['<svg width="'+svgW+'" height="'+svgH+'" xmlns="http://www.w3.org/2000/svg">'];

    // Cabeçalhos colunas
    out.push('<text x="'+(xC+NODE_W_C/2)+'" y="14" text-anchor="middle" font-size="15" font-weight="700" fill="#aaa" letter-spacing="1" font-family="Roboto,sans-serif">CONTRIBUIÇÕES</text>');
    out.push('<text x="'+(xM+NODE_W_M/2)+'" y="14" text-anchor="middle" font-size="15" font-weight="700" fill="#aaa" letter-spacing="1" font-family="Roboto,sans-serif">MINUTA DO PLANO DIRETOR</text>');

    // ── PASSO 5: links ────────────────────────────────────────────────────────
    contribs.forEach(function(c){
        if(!c.codigo || mapPY[c.codigo] === undefined) return;
        var y1  = c.py + c.h / 2;
        var y2  = mapPY[c.codigo] + ALT_NIV[mapM[c.codigo] ? mapM[c.codigo].nivel : 3] / 2;
        var mx  = (xC + NODE_W_C + xM) / 2;
        out.push('<path d="M'+(xC+NODE_W_C)+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+xM+','+y2+'" fill="none" stroke="'+COR_CONTRIB+'" stroke-width="1.5" stroke-opacity="0.22"/>');
    });

    // ── PASSO 6: caixas de contribuição ──────────────────────────────────────
    contribs.forEach(function(c, idx){
        out.push('<g class="nc" data-idx="'+idx+'" style="cursor:pointer">');
        out.push('<rect x="'+xC+'" y="'+c.py+'" width="'+NODE_W_C+'" height="'+c.h+'" rx="6" fill="'+COR_CONTRIB+'" fill-opacity="0.85"/>');
        out.push('<text font-size="11" fill="white" font-family="Roboto,sans-serif">');
        c.linhas.forEach(function(linha, li){
            var dy = li === 0 ? (c.py + PAD_TOPO_TEXTO) : 0;
            out.push('<tspan x="'+(xC+12)+'" '+(li===0 ? 'y="'+dy+'"' : 'dy="'+LINHA_H+'"')+'>'+esc(linha)+'</tspan>');
        });
        out.push('</text></g>');
    });

    // ── PASSO 7: nós da minuta com barra de votos ────────────────────────────
    minutaOrdem.forEach(function(n){
        var ind    = IND_NIV[n.nivel] || 0;
        var py     = mapPY[n.id];
        var h      = ALT_NIV[n.nivel];
        var w      = NODE_W_M - ind;
        var votos  = mapVotos[n.id] || {adequado:0, precisa:0, total:0};
        var label  = n.tipo + ' — ' + n.nome;
        var short  = esc(label.length > 120 ? label.slice(0,39)+'…' : label);
        var fs     = n.nivel === 1 ? 11 : n.nivel === 2 ? 10 : 9;
        var fw     = n.nivel <= 2 ? '700' : '500';
        var cor    = COR_NIV[n.nivel] || '#999';

        var nomeFull = esc(n.nome);
        out.push('<g class="nm" onmouseenter="showTtp(event,\''+nomeFull+'\','+votos.adequado+','+votos.precisa+')" onmouseleave="hideTtp()">');
        out.push('<rect x="'+(xM+ind)+'" y="'+py+'" width="'+w+'" height="'+h+'" rx="4" fill="'+cor+'" fill-opacity="0.9"/>');
        out.push('<text x="'+(xM+ind+8)+'" y="'+(py+h/2)+'" dominant-baseline="middle" font-size="'+fs+'" font-weight="'+fw+'" fill="white" font-family="Roboto,sans-serif">'+short+'</text>');

        if(votos.total > 0){
            var barX = xM+ind+6, barY = py+h-7, barW = w-12, barH = 4;
            var pA   = Math.round((votos.adequado / votos.total) * barW);
            var pP   = barW - pA;
            out.push('<rect x="'+barX+'" y="'+barY+'" width="'+barW+'" height="'+barH+'" rx="2" fill="rgba(0,0,0,0.2)"/>');
            if(pA > 0) out.push('<rect x="'+barX+'" y="'+barY+'" width="'+pA+'" height="'+barH+'" rx="2" fill="#00a859" fill-opacity="0.9"/>');
            if(pP > 0) out.push('<rect x="'+(barX+pA)+'" y="'+barY+'" width="'+pP+'" height="'+barH+'" fill="#F07E31" fill-opacity="0.9"/>');
        }
        out.push('</g>');
    });

    out.push('</svg>');
    document.getElementById('sankey-wrap').innerHTML = out.join('');

    // Bind clique nas contribuições via delegação (evita problemas de aspas no onclick)
    document.getElementById('sankey-wrap').onclick = function(e){
        var g = e.target.closest('.nc');
        if(g){
            var idx = parseInt(g.dataset.idx);
            verDetalhe(contribs[idx].texto);
        }
    };
}

// ── Tooltip Atualizado ────────────────────────────────────────────────────────
function showTtp(e, nome, a, p){
    var t = document.getElementById('ttp');
    var vHtml = '';
    if(a > 0 || p > 0) {
        vHtml = '<br><br><span style="color:#00a859;font-weight:600">✓ '+a+' adequado'+(a!==1?'s':'')+'</span>'
              + ' &nbsp; <span style="color:#F07E31;font-weight:600">⚠ '+p+' precisa ajuste</span>';
    }
    t.innerHTML = '<strong style="color:#ddd;font-size:0.8rem;">'+nome+'</strong>' + vHtml;
    t.classList.add('vis');
    t.style.left = (e.clientX+15)+'px';
    t.style.top  = (e.clientY-10)+'px';
}
function hideTtp(){ document.getElementById('ttp').classList.remove('vis'); }

// ── ibox (texto completo) ─────────────────────────────────────────────────────
function verDetalhe(txt){
    document.getElementById('ibox-txt').textContent = txt;
    document.getElementById('ibox').classList.add('vis');
    document.getElementById('ibox').scrollIntoView({behavior:'smooth', block:'nearest'});
}

// ── Busca ─────────────────────────────────────────────────────────────────────
function limparBusca(){
    document.getElementById('busca-inp').value = '';
    buscaTexto = '';
    document.getElementById('busca-clear').classList.remove('vis');
    resetarPagina();
    desenhar();
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('sel-etapa').addEventListener('change', function(e){
    popularOficinas(e.target.value);
});
document.getElementById('sel-oficina').addEventListener('change', function(){
    resetarPagina(); desenhar();
});
document.getElementById('sel-titulo').addEventListener('change', function(){
    resetarPagina(); desenhar();
});
document.getElementById('busca-inp').addEventListener('input', function(e){
    buscaTexto = e.target.value.trim().toLowerCase();
    document.getElementById('busca-clear').classList.toggle('vis', buscaTexto.length > 0);
    resetarPagina();
    desenhar();
});

carregar();
</script>
