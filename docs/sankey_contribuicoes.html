<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Fluxo Contribuicoes - Plano Diretor Curitiba</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');
        :root{--v:#00a859;--vl:#e6f7ee;--az:#447EC0;--azd:#1a3a5c;--bordo:#CA6673;--bg:#fff;--cd:#f3f3f3;--bd:#e2e4e8;--tx:#1a1a2e;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;}
        .stripe{height:5px;display:flex;}.stripe div{flex:1;}
        .cnt{max-width:1300px;margin:0 auto;padding:20px;}
        .ptitle{font-size:1.1rem;font-weight:700;color:var(--azd);margin-bottom:4px;}
        .psub{font-size:.8rem;color:#888;margin-bottom:14px;}
        .back{display:inline-flex;align-items:center;gap:6px;color:var(--az);font-size:.78rem;font-weight:500;text-decoration:none;margin-bottom:12px;}
        .card{background:var(--cd);border-radius:10px;padding:16px;border:.5px solid var(--bd);margin-bottom:10px;}
        .card h3{font-size:.76rem;font-weight:700;color:var(--azd);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}
        .filtros-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
        .filtro-g{display:flex;flex-direction:column;gap:4px;flex:1;min-width:160px;}
        .filtro-g label{font-size:.68rem;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
        select{border:1.5px solid var(--bd);border-radius:8px;padding:7px 10px;font-size:.78rem;font-family:Roboto,sans-serif;background:#fff;color:var(--tx);outline:none;cursor:pointer;width:100%;}
        select:focus{border-color:var(--v);}
        .loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:#888;font-size:.85rem;}
        .spinner{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--bordo);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty{text-align:center;padding:60px;color:#aaa;font-size:.85rem;display:none;}
        #sankey-wrap{overflow-x:auto;margin-top:4px;display:flex;justify-content:center;}
        .tooltip{position:fixed;background:rgba(26,26,46,.92);color:#fff;border-radius:8px;padding:8px 12px;font-size:.72rem;line-height:1.5;max-width:320px;pointer-events:none;z-index:500;display:none;box-shadow:0 4px 16px rgba(0,0,0,.25);}
        .tooltip.vis{display:block;}
        .busca-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
        .busca-input{flex:1;border:1.5px solid var(--bd);border-radius:8px;padding:7px 12px; font-size:.8rem;font-family:Roboto,sans-serif;outline:none;background:#fff;color:var(--tx);}
        .busca-input:focus{border-color:var(--v);}
        .busca-count{font-size:.72rem;color:#888;white-space:nowrap;}
        .busca-clear{background:var(--cd);border:none;border-radius:6px;padding:5px 10px; font-size:.72rem;cursor:pointer;color:#666;display:none;}
        .busca-clear.vis{display:block;}
        .ibox{background:#fff;border-radius:9px;padding:12px 14px;border:.5px solid var(--bd); margin-bottom:10px;display:none;position:relative;}
        .ibox.vis{display:block;}
        .ibox-close{position:absolute;top:8px;right:8px;background:var(--cd);border:none; border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:.8rem;color:#555;}
        .mpill{border-radius:7px;padding:2px 8px;font-size:.67rem;font-weight:600;display:inline-block;margin:2px;}
    </style>
</head>
<body>
<div class="stripe"><div style="background:#00a859"></div><div style="background:#447EC0"></div><div style="background:#8E6CAD"></div><div style="background:#8EC899"></div><div style="background:#FDC533"></div><div style="background:#F07E31"></div><div style="background:#EA535E"></div><div style="background:#CA6673"></div></div>
<div class="cnt">
    <a class="back" href="index.html">&#8592; Voltar</a>
    <div class="ptitle">Fluxo de Contribuicoes - Análise PARCIAL das contribuições do Plano Diretor Curitiba</div>
    <div class="psub">Selecione etapa, oficina e titulo para visualizar o fluxo de classificacao</div>
    <div class="card">
        <h3>Filtros</h3>
        <div class="filtros-row">
            <div class="filtro-g"><label>Etapa</label><select id="sel-etapa"><option value="">Carregando...</option></select></div>
            <div class="filtro-g"><label>Oficina</label><select id="sel-oficina"><option value="">Aguardando etapa...</option></select></div>
            <div class="filtro-g"><label>Titulo da Minuta</label><select id="sel-titulo"><option value="">Todos os titulos</option><option value="T1">T1 &mdash; DO DESENVOLVIMENTO URBANO SUSTENTÁVEL</option><option value="T2">T2 &mdash; DA INTEGRAÇÃO METROPOLITANA</option><option value="T3">T3 &mdash; DA POLÍTICA TERRITORIAL INTEGRADA</option><option value="T4">T4 &mdash; DA ARTICULAÇÃO DE POLÍTICAS PÚBLICAS NO TERRI</option><option value="T5">T5 &mdash; DOS INSTRUMENTOS DA POLÍTICA TERRITORIAL INTE</option><option value="T6">T6 &mdash; DO SISTEMA DE PLANEJAMENTO E GESTÃO DEMOCRÁTI</option><option value="T7">T7 &mdash; DAS DISPOSIÇÕES FINAIS E TRANSITÓRIAS</option></select></div>
        </div>
    </div>
    <div class="ibox" id="ibox"><button class="ibox-close" onclick="document.getElementById('ibox').classList.remove('vis')">&#10005;</button><div id="ibox-titulo" style="font-weight:700;color:var(--bordo);margin-bottom:6px;"></div><div id="ibox-pills"></div><div id="ibox-txt" style="margin-top:8px;"></div></div>
    <div class="busca-wrap"><input class="busca-input" id="busca-inp" type="text" placeholder="Buscar..."><span class="busca-count" id="busca-count"></span><button class="busca-clear" id="busca-clear" onclick="limparBusca()">✕ Limpar</button></div>
    <div class="card"><h3 id="card-titulo">Fluxo</h3><div id="loading-msg" class="loading"><div class="spinner"></div><span>Carregando dados...</span></div><div id="empty-msg" class="empty">Selecione etapa e oficina para visualizar o fluxo.</div><div id="sankey-wrap" style="display:none;"></div></div>
</div>
<div class="tooltip" id="ttp"></div>

<script id="data-minuta" type="application/json">{"minuta": [{"id": "T1", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DO DESENVOLVIMENTO URBANO SUSTENT\u00c1VEL", "titulo_pai": "T1"}, {"id": "T2", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DA INTEGRA\u00c7\u00c3O METROPOLITANA", "titulo_pai": "T2"}, {"id": "T3", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DA POL\u00cdTICA TERRITORIAL INTEGRADA", "titulo_pai": "T3"}, {"id": "T4", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DA ARTICULA\u00c7\u00c3O DE POL\u00cdTICAS P\u00daBLICAS NO TERRIT\u00d3RIO", "titulo_pai": "T4"}, {"id": "T5", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DOS INSTRUMENTOS DA POL\u00cdTICA TERRITORIAL INTEGRADA", "titulo_pai": "T5"}, {"id": "T6", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DO SISTEMA DE PLANEJAMENTO E GEST\u00c3O DEMOCR\u00c1TICA DA CIDADE", "titulo_pai": "T6"}, {"id": "T7", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DAS DISPOSI\u00c7\u00d5ES FINAIS E TRANSIT\u00d3RIAS", "titulo_pai": "T7"}]}</script>
<script id="data-surl" type="application/json">"https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDMje4w1kwNnGKcE4FyQgs8cVKa9CjpwOGa6QZ1FDxo3QITxIeJxFcgR5DPzI3Sgq_bosiHMI9qFZ/pub?output=csv"</script>

<script>
var MINUTA_RAW = JSON.parse(document.getElementById('data-minuta').textContent);
var SURL = document.getElementById('data-surl').textContent.trim().replace(/^"|"$/g,'');
var todosRows=[], etapas=[], oficPorEtapa={}, mapM={};
var COR_CONTRIB = '#CA6673', COR_NIV = {1:'#555',2:'#777',3:'#999',4:'#bbb'}, ALT_NIV = {1:44,2:36,3:30,4:26}, IND_NIV = {1:0,2:14,3:28,4:40};
var GAP_CONTRIB = 8, GAP_MINUTA = 5, NODE_W_C = 500, NODE_W_M = 340, COL_GAP = 100, PAD = 20;

MINUTA_RAW.minuta.forEach(n => mapM[n.id] = n);

// --- CONFIGURAÇÃO DE CARREGAMENTO INICIAL ---
const DEFAULT_CONFIG = {
    etapa: "etapa3", // Ajuste para "Etapa 3" se for o nome exato no seu CSV
    oficina: "Site Minuta Interativa",
    titulo: "T1"
};

function nc(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''); }

function parseCSV(txt){
    const rows = []; let cur='', inQ=false, fields=[], i=0;
    while(i<txt.length){
        let ch=txt[i];
        if(ch==='"'){if(inQ&&txt[i+1]==='"'){cur+='"';i+=2;continue;}inQ=!inQ;i++;continue;}
        if(ch===','&&!inQ){fields.push(cur);cur='';i++;continue;}
        if(ch==='\n'&&!inQ){fields.push(cur);cur='';rows.push(fields);fields=[];i++;continue;}
        cur+=ch;i++;
    }
    if(cur||fields.length){fields.push(cur);rows.push(fields);}
    const headers = rows[0].map(h => nc(h));
    const iC=headers.findIndex(h => h.includes('cod')), iP=headers.findIndex(h => h.includes('prop')), iF=headers.findIndex(h => h==='fonte'), iO=headers.findIndex(h => h.includes('ofic'));
    return rows.slice(1).map(v => ({
        codigo: (v[iC]||'').trim(), proposta: (v[iP]||'').trim(), fonte: (v[iF]||'').trim(), oficina: (v[iO]||'').trim()
    })).filter(r => r.codigo && r.codigo !== 'nan');
}

async function carregar(){
    try {
        const resp = await fetch(SURL);
        const text = await resp.text();
        todosRows = parseCSV(text);
        
        etapas = [...new Set(todosRows.map(r => r.fonte))].sort();
        etapas.forEach(e => {
            oficPorEtapa[e] = [...new Set(todosRows.filter(r => r.fonte === e).map(r => r.oficina))].filter(o => o).sort();
        });

        const selE = document.getElementById('sel-etapa');
        const selO = document.getElementById('sel-oficina');
        const selT = document.getElementById('sel-titulo');

        selE.innerHTML = etapas.map(e => `<option value="${e}">${e}</option>`).join('');
        
        // APLICAÇÃO DOS FILTROS PADRÃO
        if (etapas.includes(DEFAULT_CONFIG.etapa)) selE.value = DEFAULT_CONFIG.etapa;
        
        popularOficinas(selE.value);
        if (oficPorEtapa[selE.value]?.includes(DEFAULT_CONFIG.oficina)) selO.value = DEFAULT_CONFIG.oficina;
        
        selT.value = DEFAULT_CONFIG.titulo;

        document.getElementById('loading-msg').style.display = 'none';
        desenhar();
    } catch(e) {
        console.error(e);
        document.getElementById('loading-msg').innerHTML = 'Erro ao carregar dados.';
    }
}

function popularOficinas(etapa){
    const selO = document.getElementById('sel-oficina');
    const ofs = oficPorEtapa[etapa] || [];
    selO.innerHTML = ofs.map(o => `<option value="${o}">${o}</option>`).join('');
}

function resolverCod(cod){
    if(!cod || mapM[cod]) return cod;
    const partes = cod.split('-');
    for(let i=partes.length-1; i>0; i--){
        let pai = partes.slice(0,i).join('-');
        if(mapM[pai]) return pai;
    }
    return null;
}

function desenhar(){
    const etapa = document.getElementById('sel-etapa').value;
    const oficina = document.getElementById('sel-oficina').value;
    const tituloF = document.getElementById('sel-titulo').value;
    if(!oficina) return;

    let rows = todosRows.filter(r => r.fonte === etapa && r.oficina === oficina);
    if(tituloF) rows = rows.filter(r => (resolverCod(r.codigo)||'').startsWith(tituloF));

    if(!rows.length) {
        document.getElementById('empty-msg').style.display='block';
        document.getElementById('sankey-wrap').style.display='none';
        return;
    }

    document.getElementById('empty-msg').style.display='none';
    const wrap = document.getElementById('sankey-wrap');
    wrap.style.display='block';
    
    // Simplificação do desenho para garantir performance
    const contribs = rows.map((r,i) => ({id:'c'+i, texto:r.proposta, cod:resolverCod(r.codigo)}));
    const hC = contribs.length * (40 + GAP_CONTRIB);
    const svgH = Math.max(hC, 400);
    
    let html = `<svg width="${NODE_W_C + COL_GAP + NODE_W_M + 40}" height="${svgH + 40}">`;
    contribs.forEach((c, i) => {
        const y = 20 + i * (40 + GAP_CONTRIB);
        html += `<rect x="20" y="${y}" width="${NODE_W_C}" height="40" rx="4" fill="${COR_CONTRIB}" fill-opacity="0.8" />`;
        html += `<text x="30" y="${y+24}" fill="white" font-size="11">${c.texto.substring(0,80)}...</text>`;
    });
    html += `</svg>`;
    wrap.innerHTML = html;
}

document.getElementById('sel-etapa').onchange = (e) => { popularOficinas(e.target.value); desenhar(); };
document.getElementById('sel-oficina').onchange = () => desenhar();
document.getElementById('sel-titulo').onchange = () => desenhar();

window.onload = carregar;
</script>
</body>
</html>
