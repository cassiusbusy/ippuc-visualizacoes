<script>
document.addEventListener('DOMContentLoaded', function() {
  // Selects (etapa, oficina, titulo)
  ['sel-etapa','sel-oficina','sel-titulo'].forEach(function(id) {
    var el = document.getElementById(id);
    if(el) el.addEventListener('change', function() {
      gtag('event', 'filtro', {event_category: 'interaction', event_label: id, value: el.value});
    });
  });
  // Campo de busca
  var busca = document.getElementById('busca-inp');
  if(busca) {
    var _bt;
    busca.addEventListener('input', function() {
      clearTimeout(_bt);
      _bt = setTimeout(function() {
        if(busca.value.length > 2)
          gtag('event', 'busca', {event_category: 'interaction', event_label: 'sankey', value: busca.value});
      }, 800);
    });
  }
  // Clique em contribuição (nó .nc)
  document.getElementById('sankey-wrap').addEventListener('click', function(e) {
    var nc = e.target.closest('.nc');
    if(nc) gtag('event', 'clique_contribuicao', {event_category: 'interaction', event_label: 'sankey'});
    var nm = e.target.closest('.nm');
    if(nm) gtag('event', 'clique_minuta', {event_category: 'interaction', event_label: nm.dataset && nm.dataset.id || 'sankey'});
  });
});
</script>

<script>
(function(){
  var ms = {25:false,50:false,75:false,100:false};
  window.addEventListener('scroll', function(){
    var pct = Math.round((window.scrollY + window.innerHeight) / document.body.scrollHeight * 100);
    [25,50,75,100].forEach(function(m){
      if(pct >= m && !ms[m]){ ms[m]=true; gtag('event','scroll_depth',{event_category:'scroll',event_label:'sankey',value:m}); }
    });
  });
})();
</script>
