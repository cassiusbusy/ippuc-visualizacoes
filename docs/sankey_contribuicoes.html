<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Fluxo Contribuições - Plano Diretor Curitiba</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap');
        :root{--v:#00a859;--vl:#e6f7ee;--az:#447EC0;--azd:#1a3a5c;--bordo:#CA6673;--bg:#fff;--cd:#f3f3f3;--bd:#e2e4e8;--tx:#1a1a2e;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;}
        .stripe{height:5px;display:flex;}.stripe div{flex:1;}
        .cnt{max-width:1450px;margin:0 auto;padding:20px;}
        .ptitle{font-size:1.1rem;font-weight:700;color:var(--azd);margin-bottom:4px;}
        .psub{font-size:.8rem;color:#888;margin-bottom:14px;}
        .back{display:inline-flex;align-items:center;gap:6px;color:var(--az);font-size:.78rem;font-weight:500;text-decoration:none;margin-bottom:12px;}
        .card{background:var(--cd);border-radius:10px;padding:16px;border:.5px solid var(--bd);margin-bottom:10px;}
        .card h3{font-size:.76rem;font-weight:700;color:var(--azd);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;}
        .filtros-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
        .filtro-g{display:flex;flex-direction:column;gap:4px;flex:1;min-width:160px;}
        .filtro-g label{font-size:.68rem;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
        select{border:1.5px solid var(--bd);border-radius:8px;padding:7px 10px;font-size:.78rem;font-family:Roboto,sans-serif;background:#fff;color:var(--tx);outline:none;cursor:pointer;width:100%;}
        select:focus{border-color:var(--v);}
        .loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:60px;color:#888;font-size:.85rem;}
        .spinner{width:20px;height:20px;border:2px solid var(--bd);border-top-color:var(--bordo);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty{text-align:center;padding:60px;color:#aaa;font-size:.85rem;display:none;}
        #sankey-wrap{overflow-x:auto;margin-top:4px;display:flex;justify-content:center;}
        .tooltip{position:fixed;background:rgba(26,26,46,.95);color:#fff;border-radius:8px;padding:8px 12px;font-size:.72rem;line-height:1.5;max-width:320px;pointer-events:none;z-index:500;display:none;box-shadow:0 4px 16px rgba(0,0,0,.25);}
        .tooltip.vis{display:block;}
        .busca-wrap{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
        .busca-input{flex:1;border:1.5px solid var(--bd);border-radius:8px;padding:7px 12px; font-size:.8rem;outline:none;background:#fff;color:var(--tx);}
        .busca-clear{background:var(--cd);border:none;border-radius:6px;padding:5px 10px; font-size:.72rem;cursor:pointer;display:none;}
        .busca-clear.vis{display:block;}
        .ibox{background:#fff;border-radius:9px;padding:12px 14px;border:.5px solid var(--bd); margin-bottom:10px;display:none;position:relative;}
        .ibox.vis{display:block;}
        .ibox-close{position:absolute;top:8px;right:8px;background:var(--cd);border:none; border-radius:50%;width:24px;height:24px;cursor:pointer;}
        .mpill{border-radius:7px;padding:2px 8px;font-size:.67rem;font-weight:600;display:inline-block;margin:2px;}
        .pag-wrap{display:flex;justify-content:flex-end;align-items:center;gap:12px;margin-bottom:10px;}
        .pag-btn{background:#fff;border:1px solid var(--bd);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.75rem;font-weight:600;color:var(--azd);}
        .pag-btn:hover{background:var(--vl);border-color:var(--v);}
        .pag-info{font-size:.75rem;font-weight:700;color:#666;min-width:100px;text-align:center;}
    </style>
</head>
<body>
<div class="stripe"><div style="background:#00a859"></div><div style="background:#447EC0"></div><div style="background:#8E6CAD"></div><div style="background:#8EC899"></div><div style="background:#FDC533"></div><div style="background:#F07E31"></div><div style="background:#EA535E"></div><div style="background:#CA6673"></div></div>

<div class="cnt">
    <a class="back" href="index.html">&#8592; Voltar</a>
    <div class="ptitle">Fluxo de Contribuições - Análise Parcial do Plano Diretor Curitiba</div>
    <div class="psub">Visualize a relação entre as propostas da população e a estrutura da minuta técnica.</div>

    <div class="card">
        <h3>Filtros</h3>
        <div class="filtros-row">
            <div class="filtro-g"><label>Etapa</label><select id="sel-etapa"><option value="">Carregando...</option></select></div>
            <div class="filtro-g"><label>Oficina</label><select id="sel-oficina"><option value="">Selecione a etapa primeiro</option></select></div>
            <div class="filtro-g">
                <label>Titulo da Minuta</label>
                <select id="sel-titulo">
                    <option value="">Todos os titulos</option>
                    <option value="T1">T1 &mdash; DO DESENVOLVIMENTO URBANO SUSTENTÁVEL</option>
                    <option value="T2">T2 &mdash; DA INTEGRAÇÃO METROPOLITANA</option>
                    <option value="T3">T3 &mdash; DA POLÍTICA TERRITORIAL INTEGRADA</option>
                    <option value="T4">T4 &mdash; DA ARTICULAÇÃO DE POLÍTICAS PÚBLICAS NO TERRITÓRIOL</option>
                    <option value="T5">T5 &mdash; DOS INSTRUMENTOS DA POLÍTICA TERRITORIAL INTEGRADA</option>
                    <option value="T6">T6 &mdash; DO SISTEMA DE PLANEJAMENTO E GESTÃO DEMOCRÁTICA DA CIDADE</option>
                    <option value="T7">T7 &mdash; DAS DISPOSIÇÕES FINAIS E TRANSITÓRIAS</option>
                </select>
            </div>
        </div>
    </div>

    <div class="ibox" id="ibox">
        <button class="ibox-close" onclick="document.getElementById('ibox').classList.remove('vis')">&#10005;</button>
        <div style="font-size:.88rem;font-weight:700;color:var(--bordo);margin-bottom:6px;" id="ibox-titulo"></div>
        <div id="ibox-pills" style="margin-bottom:8px;"></div>
        <div style="font-size:.82rem;color:#333;line-height:1.7;" id="ibox-txt"></div>
    </div>

    <div class="busca-wrap">
        <input class="busca-input" id="busca-inp" type="text" placeholder="Buscar por texto da contribuição...">
        <button class="busca-clear" id="busca-clear" onclick="limparBusca()">✕ Limpar</button>
    </div>

    <div class="pag-wrap">
        <button class="pag-btn" onclick="mudarPagina(-1)">← Anterior</button>
        <span class="pag-info" id="pag-info">Página 1</span>
        <button class="pag-btn" onclick="mudarPagina(1)">Próxima →</button>
    </div>

    <div class="card">
        <h3 id="card-titulo">Fluxo</h3>
        <div id="loading-msg" class="loading"><div class="spinner"></div><span>Carregando dados...</span></div>
        <div id="empty-msg" class="empty">Selecione etapa e oficina para visualizar.</div>
        <div id="sankey-wrap" style="display:none;"></div>
    </div>
</div>

<div class="tooltip" id="ttp"></div>

<script id="data-minuta" type="application/json">{"minuta": [{"id": "T1", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DO DESENVOLVIMENTO URBANO SUSTENT\u00c1VEL", "titulo_pai": "T1"}, {"id": "T1-C1", "nivel": 2, "tipo": "CAP\u00cdTULO", "nome": "DAS DISPOSI\u00c7\u00d5ES PRELIMINARES", "titulo_pai": "T1"}, {"id": "T1-C2", "nivel": 2, "tipo": "CAP\u00cdTULO", "nome": "DA VIS\u00c3O DE FUTURO DE DESENVOLVIMENTO URBANO SUSTENT\u00c1VEL", "titulo_pai": "T1"}, {"id": "T1-C2-S1", "nivel": 3, "tipo": "SE\u00c7\u00c3O", "nome": "Dos Princ\u00edpios e da Vis\u00e3o 2050", "titulo_pai": "T1"}, {"id": "T1-C3", "nivel": 2, "tipo": "CAP\u00cdTULO", "nome": "DAS ESTRAT\u00c9GIAS DE DESENVOLVIMENTO", "titulo_pai": "T1"}, {"id": "T1-C3-S2", "nivel": 3, "tipo": "SE\u00c7\u00c3O", "nome": "Da Cidade Inteligente, Inovadora...", "titulo_pai": "T1"}, {"id": "T2", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DA INTEGRA\u00c7\u00c3O METROPOLITANA", "titulo_pai": "T2"}, {"id": "T3", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DA POL\u00cdTICA TERRITORIAL INTEGRADA", "titulo_pai": "T3"}, {"id": "T3-C6", "nivel": 2, "tipo": "CAP\u00cdTULO", "nome": "DA GEST\u00c3O E REDU\u00c7\u00c3O DE RISCO", "titulo_pai": "T3"}, {"id": "T4", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DA ARTICULA\u00c7\u00c3O DE POL\u00cdTICAS P\u00daBLICAS", "titulo_pai": "T4"}, {"id": "T4-C1", "nivel": 2, "tipo": "CAP\u00cdTULO", "nome": "DO DESENVOLVIMENTO SOCIAL", "titulo_pai": "T4"}, {"id": "T4-C2", "nivel": 2, "tipo": "CAP\u00cdTULO", "nome": "DO DESENVOLVIMENTO ECON\u00d4MICO", "titulo_pai": "T4"}, {"id": "T5", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DOS INSTRUMENTOS DA POL\u00cdTICA", "titulo_pai": "T5"}, {"id": "T6", "nivel": 1, "tipo": "T\u00cdTULO", "nome": "DO SISTEMA DE PLANEJAMENTO", "titulo_pai": "T6"}]}</script>
<script id="data-surl" type="application/json">"https://docs.google.com/spreadsheets/d/e/2PACX-1vSQDMje4w1kwNnGKcE4FyQgs8cVKa9CjpwOGa6QZ1FDxo3QITxIeJxFcgR5DPzI3Sgq_bosiHMI9qFZ/pub?output=csv"</script>
<script id="data-vurl" type="application/json">"https://docs.google.com/spreadsheets/d/e/2PACX-1vRTkDilIYq08rDXuEvDHjpz_VO70WbNx7GJKqKEpHVKosapNqqGaYudumm3aOUjvsT5dHV71ZU8j6Cv/pub?gid=0&single=true&output=csv"</script>

<script>
// CONFIGURAÇÕES E VARIÁVEIS
var MINUTA = JSON.parse(document.getElementById('data-minuta').textContent);
var SURL = document.getElementById('data-surl').textContent.trim().replace(/^"|"$/g,'');
var VURL = document.getElementById('data-vurl').textContent.trim().replace(/^"|"$/g,'');

var paginaAtual = 0;
var itensPorPagina = 10;
var buscaTexto = '';
var mapVotos = {}; 
var todosRows = [], etapas = [], oficPorEtapa = {}, mapM = {};

var COR_CONTRIB = '#CA6673';
var COR_NIV = {1:'#555', 2:'#777', 3:'#999', 4:'#bbb'};
var ALT_NIV = {1:44, 2:36, 3:30, 4:26, contrib: 75};
var IND_NIV = {1:0, 2:14, 3:28, 4:40, 5:40};
var NODE_W_C = 650, NODE_W_M = 340, COL_GAP = 120, PAD = 20, GAP_CONTRIB = 12;

MINUTA.minuta.forEach(n => mapM[n.id] = n);

function nc(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''); }

// CARREGAMENTO DE CSV
function parseCSV(txt){
    var rows=[],cur='',inQ=false,fields=[],i=0;
    while(i<txt.length){
        var ch=txt[i];
        if(ch==='"'){if(inQ&&txt[i+1]==='"'){cur+='"';i+=2;continue;}inQ=!inQ;i++;continue;}
        if(ch===','&&!inQ){fields.push(cur);cur='';i++;continue;}
        if(ch==='\n'&&!inQ){fields.push(cur);cur='';rows.push(fields);fields=[];i++;continue;}
        cur+=ch;i++;
    }
    if(cur||fields.length){fields.push(cur);rows.push(fields);}
    var norm=rows[0].map(nc);
    var iC=norm.findIndex(h=>h.includes('cdigo')||h==='codigo'), iP=norm.findIndex(h=>h.includes('proposta')), iF=norm.findIndex(h=>h==='fonte'), iO=norm.findIndex(h=>h.includes('oficina'));
    return rows.slice(1).map(v=>{
        function g(idx){return idx>=0?(v[idx]||'').trim().replace(/^"|"$/g,''):'';}
        return {codigo:g(iC), proposta:g(iP), fonte:g(iF), oficina:g(iO)};
    });
}

// LOGICA DE VOTOS (AQUI ESTAVA O ERRO)
async function carregarVotos() {
    try {
        const resp = await fetch(VURL);
        const txt = await resp.text();
        const rows = txt.split('\n').map(r => r.split(','));
        const head = rows[0].map(nc);
        const iId = head.findIndex(h => h.includes('estrutura') || h==='id');
        const iV = head.findIndex(h => h.includes('voto'));

        rows.slice(1).forEach(r => {
            const id = (r[iId]||'').trim();
            const voto = (r[iV]||'').toLowerCase();
            if(!id) return;
            if(!mapVotos[id]) mapVotos[id] = {adequado:0, precisa:0, total:0};
            if(voto.includes('adequado')) mapVotos[id].adequado++;
            else if(voto.includes('ajuste') || voto.includes('precisa')) mapVotos[id].precisa++;
            mapVotos[id].total = mapVotos[id].adequado + mapVotos[id].precisa;
        });
        console.log("Votos carregados:", Object.keys(mapVotos).length);
    } catch(e) { console.warn("Erro votos:", e); }
}

async function carregar(){
    await carregarVotos();
    try{
        const r = await fetch(SURL);
        todosRows = parseCSV(await r.text()).filter(r=>r.codigo);
        etapas = [...new Set(todosRows.map(r=>r.fonte))].sort();
        etapas.forEach(e => {
            oficPorEtapa[e] = [...new Set(todosRows.filter(r=>r.fonte===e).map(r=>r.oficina))].filter(o=>o).sort();
        });
        const selE = document.getElementById('sel-etapa');
        selE.innerHTML = etapas.map(e => `<option value="${e}">${e}</option>`).join('');
        popularOficinas(etapas[0]);
        document.getElementById('loading-msg').style.display='none';
    } catch(e){ console.error(e); }
}

function popularOficinas(etapa){
    const selO = document.getElementById('sel-oficina');
    const ofs = oficPorEtapa[etapa] || [];
    selO.innerHTML = ofs.map(o => `<option value="${o}">${o}</option>`).join('');
    paginaAtual = 0;
    desenhar();
}

function resolverCod(cod){
    if(!cod) return null; if(mapM[cod]) return cod;
    let partes = cod.split('-');
    for(let i=partes.length-1; i>0; i--){
        let pai = partes.slice(0,i).join('-');
        if(mapM[pai]) return pai;
    }
    return null;
}

function mudarPagina(dir) {
    paginaAtual += dir;
    if(paginaAtual < 0) paginaAtual = 0;
    desenhar();
}

function desenhar(){
    const etapa = document.getElementById('sel-etapa').value;
    const oficina = document.getElementById('sel-oficina').value;
    const tituloF = document.getElementById('sel-titulo').value;
    if(!oficina) return;

    let f = todosRows.filter(r => r.fonte === etapa && r.oficina === oficina);
    if(tituloF) f = f.filter(r => (r.codigo||'').startsWith(tituloF));
    if(buscaTexto) f = f.filter(r => r.proposta.toLowerCase().includes(buscaTexto));

    const totalP = Math.ceil(f.length / itensPorPagina);
    if(paginaAtual >= totalP) paginaAtual = Math.max(0, totalP - 1);
    
    document.getElementById('pag-info').textContent = `Página ${paginaAtual + 1} de ${totalP || 1}`;
    const rows = f.slice(paginaAtual * itensPorPagina, (paginaAtual + 1) * itensPorPagina);

    if(rows.length === 0) {
        document.getElementById('sankey-wrap').style.display='none';
        document.getElementById('empty-msg').style.display='block';
        return;
    }

    document.getElementById('empty-msg').style.display='none';
    document.getElementById('sankey-wrap').style.display='block';

    const contribs = rows.map((r, i) => ({id:'c'+i, texto:r.proposta, codigo:resolverCod(r.codigo)}));
    const vMin = new Set(), minutaOrdem = [];
    contribs.forEach(c => {
        if(!c.codigo) return;
        let p = c.codigo.split('-');
        for(let n=1; n<=p.length; n++) {
            let id = p.slice(0,n).join('-');
            if(mapM[id] && !vMin.has(id)) { vMin.add(id); minutaOrdem.push(mapM[id]); }
        }
    });

    // Renderização SVG
    let yC = PAD + 20, posC = [];
    contribs.forEach(c => {
        let nL = c.texto.length > 160 ? 3 : c.texto.length > 80 ? 2 : 1;
        let h = nL === 3 ? 58 : nL === 2 ? 44 : 32;
        posC.push({...c, py: yC, h: h});
        yC += h + GAP_CONTRIB;
    });

    let hM = minutaOrdem.reduce((s, n) => s + ALT_NIV[n.nivel] + 5, 0);
    let svgH = Math.max(yC, hM + 40, 400);
    let xC = PAD, xM = PAD + NODE_W_C + COL_GAP;
    let out = [`<svg width="${xM + NODE_W_M + PAD}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">`];

    // Desenha Links
    let mapPY = {}; 
    let yMacc = PAD + 40;
    minutaOrdem.forEach(n => {
        mapPY[n.id] = yMacc;
        yMacc += ALT_NIV[n.nivel] + 5;
    });

    posC.forEach(c => {
        if(!c.codigo || mapPY[c.codigo] === undefined) return;
        let y1 = c.py + c.h/2, y2 = mapPY[c.codigo] + ALT_NIV[mapM[c.codigo].nivel]/2;
        out.push(`<path d="M${xC+NODE_W_C},${y1} C${(xC+NODE_W_C+xM)/2},${y1} ${(xC+NODE_W_C+xM)/2},${y2} ${xM},${y2}" fill="none" stroke="${COR_CONTRIB}" stroke-width="1.5" stroke-opacity="0.2"/>`);
    });

    // Desenha Contribuições
    posC.forEach(c => {
        out.push(`<g class="nc" style="cursor:pointer" onclick="verDetalhe('${c.texto.replace(/'/g,"\\'")}')">
            <rect x="${xC}" y="${c.py}" width="${NODE_W_C}" height="${c.h}" rx="6" fill="${COR_CONTRIB}" fill-opacity="0.85"/>
            <text x="${xC+12}" y="${c.py+18}" font-size="11" fill="white">${c.texto.slice(0, 90)}...</text>
        </g>`);
    });

    // Desenha Minuta com BARRAS DE VOTAÇÃO
    minutaOrdem.forEach(n => {
        let ind = IND_NIV[n.nivel] || 0;
        let py = mapPY[n.id];
        let w = NODE_W_M - ind;
        let votos = mapVotos[n.id] || {adequado:0, precisa:0, total:0};

        out.push(`<g class="nm" onmouseenter="showTtp(event, '${n.nome}', ${votos.adequado}, ${votos.precisa})" onmouseleave="hideTtp()">
            <rect x="${xM+ind}" y="${py}" width="${w}" height="${ALT_NIV[n.nivel]}" rx="4" fill="${COR_NIV[n.nivel]}" fill-opacity="0.9"/>
            <text x="${xM+ind+8}" y="${py+18}" font-size="10" font-weight="600" fill="white">${n.tipo} - ${n.nome.slice(0, 35)}...</text>`);
        
        // Barra de progresso (Votação)
        if(votos.total > 0) {
            let barW = w - 16, barH = 4, pA = (votos.adequado / votos.total) * barW;
            out.push(`<rect x="${xM+ind+8}" y="${py+ALT_NIV[n.nivel]-8}" width="${barW}" height="${barH}" rx="2" fill="rgba(0,0,0,0.2)"/>
                      <rect x="${xM+ind+8}" y="${py+ALT_NIV[n.nivel]-8}" width="${pA}" height="${barH}" rx="2" fill="#00a859"/>
                      <rect x="${xM+ind+8+pA}" y="${py+ALT_NIV[n.nivel]-8}" width="${barW-pA}" height="${barH}" rx="2" fill="#F07E31"/>`);
        }
        out.push(`</g>`);
    });

    out.push('</svg>');
    document.getElementById('sankey-wrap').innerHTML = out.join('');
}

// INTERAÇÕES
function showTtp(e, nome, a, p) {
    const t = document.getElementById('ttp');
    t.innerHTML = `<strong>${nome}</strong><br><span style="color:#00a859">Adequado: ${a}</span> | <span style="color:#F07E31">Ajustes: ${p}</span>`;
    t.style.display = 'block'; t.style.left = (e.clientX + 15) + 'px'; t.style.top = (e.clientY - 20) + 'px';
}
function hideTtp() { document.getElementById('ttp').style.display = 'none'; }
function verDetalhe(txt) {
    const i = document.getElementById('ibox');
    document.getElementById('ibox-txt').textContent = txt;
    i.style.display = 'block';
}
function limparBusca() { document.getElementById('busca-inp').value = ''; buscaTexto = ''; desenhar(); }

document.getElementById('sel-etapa').addEventListener('change', e => popularOficinas(e.target.value));
document.getElementById('sel-oficina').addEventListener('change', desenhar);
document.getElementById('sel-titulo').addEventListener('change', desenhar);
document.getElementById('busca-inp').addEventListener('input', e => { buscaTexto = e.target.value.toLowerCase(); desenhar(); });

carregar();
</script>
</body>
</html>
