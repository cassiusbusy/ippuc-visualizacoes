  if(cur||fields.length){fields.push(cur);rows.push(fields);}
  if(rows.length<2)return[];
  var raw=rows[0].map(function(h){return h.trim().replace(/^"|"$/g,'');});
  var norm=raw.map(nc);
  var iC=norm.findIndex(function(h){return h.includes('cdigo')||h==='codigo';});
  var iP=norm.findIndex(function(h){return h.includes('proposta');});
  var iF=norm.findIndex(function(h){return h==='fonte';});
  var iO=norm.findIndex(function(h){return h.includes('oficina');});
  console.log('Headers:',raw,'iC:',iC,'iP:',iP,'iF:',iF,'iO:',iO);
  return rows.slice(1).filter(function(r){return r.length>1;}).map(function(v){
    function g(i){return i>=0?(v[i]||'').trim().replace(/^"|"$/g,''):'';};
    return{codigo:g(iC),proposta:g(iP),fonte:g(iF)||'outros',oficina:g(iO)};
  });
}

function resolverCod(cod){
  if(!cod)return null;
  if(mapM[cod])return cod;
  var partes=cod.split('-');
  for(var i=partes.length-1;i>0;i--){
    var pai=partes.slice(0,i).join('-');
    if(mapM[pai])return pai;
  }
  return null;
}

async function carregar(){
  try{
    var r=await fetch(SURL);
    if(!r.ok)throw new Error('HTTP '+r.status);
    todosRows=parseCSV(await r.text()).filter(function(r){return r.codigo&&r.codigo!=='nan';});
    console.log('Rows:',todosRows.length);
    etapas=[...new Set(todosRows.map(function(r){return r.fonte;}))].sort();
    etapas.forEach(function(e){
      oficPorEtapa[e]=[...new Set(todosRows.filter(function(r){return r.fonte===e;}).map(function(r){return r.oficina;}).filter(function(o){return o&&o!=='nan'&&o!=='';  }))].sort();
    });
    var selE=document.getElementById('sel-etapa');
    selE.innerHTML='';
    etapas.forEach(function(e){var o=document.createElement('option');o.value=e;o.textContent=e;selE.appendChild(o);});
    if(etapas.includes(DEF_ETAPA)){selE.value=DEF_ETAPA;popularOficinas(DEF_ETAPA,DEF_OFICINA);}
    else{selE.value=etapas[0];popularOficinas(etapas[0]);}
    document.getElementById('loading-msg').style.display='none';
  }catch(e){
    console.error(e);
    document.getElementById('loading-msg').innerHTML='<span style="color:#CA6673">Erro: '+e.message+'</span>';
  }
}

function popularOficinas(etapa,selecionar){
  var selO=document.getElementById('sel-oficina');
  selO.innerHTML='<option value="">Selecione uma oficina</option>';
  var ofs=oficPorEtapa[etapa]||[];
  ofs.forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;selO.appendChild(op);});
  if(selecionar&&ofs.includes(selecionar)){selO.value=selecionar;desenhar();}
  else{document.getElementById('empty-msg').style.display='block';document.getElementById('sankey-wrap').style.display='none';}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function desenhar(){
  var etapa=document.getElementById('sel-etapa').value;
  var oficina=document.getElementById('sel-oficina').value;
  var tituloF=document.getElementById('sel-titulo').value;
  if(!oficina)return;

  var rows=todosRows.filter(function(r){
    return r.fonte===etapa&&r.oficina===oficina;
  });

  // Filtrar por título se selecionado
  if(tituloF){
    rows=rows.filter(function(r){
      var cod=resolverCod(r.codigo);
      return cod&&cod.split('-')[0]===tituloF;
    });
  }

  if(rows.length===0){
    document.getElementById('empty-msg').textContent='Nenhuma contribuicao encontrada para esta selecao.';
    document.getElementById('empty-msg').style.display='block';
    document.getElementById('sankey-wrap').style.display='none';
    return;
  }
  document.getElementById('empty-msg').style.display='none';
  document.getElementById('sankey-wrap').style.display='block';
  document.getElementById('card-titulo').textContent='Fluxo: '+etapa+' / '+oficina+(tituloF?' / '+tituloF:'')+' ('+rows.length+' contrib.)';

  // Resolver hierarquia para cada contribuição
  var contribs=rows.map(function(r,i){
    var cod=resolverCod(r.codigo);
    return{id:'c'+i,texto:r.proposta,codigo:cod};
  });

  // Construir lista ordenada de nós da minuta referenciados
  // Ordem: para cada contrib, pegar título→cap→sec→sub
  var minutaOrdem=[];
  var minutaVisto=new Set();
  contribs.forEach(function(c){
    if(!c.codigo)return;
    var partes=c.codigo.split('-');
    var nivMax=mapM[c.codigo]?mapM[c.codigo].nivel:partes.length;
    // Adicionar cada ancestral em ordem hierárquica
    for(var n=1;n<=nivMax;n++){
      var id=partes.slice(0,n).join('-');
      if(mapM[id]&&!minutaVisto.has(id)){
        minutaVisto.add(id);
        minutaOrdem.push(mapM[id]);
      }
    }
  });

  // Calcular alturas
  var hC=contribs.length*(ALT_NIV[3]+GAP_CONTRIB)-GAP_CONTRIB;
  var hM=0;
  minutaOrdem.forEach(function(n){hM+=ALT_NIV[n.nivel]+GAP_MINUTA;});
  hM-=GAP_MINUTA;

  var svgH=Math.max(hC,hM,300)+PAD*2;
  var xC=PAD, xM=PAD+NODE_W_C+COL_GAP;
  var svgW=xM+NODE_W_M+PAD;

  // Posições Y
  var yC=PAD+(svgH-PAD*2-hC)/2;
  var posC=contribs.map(function(c,i){
    var py=yC+i*(ALT_NIV[3]+GAP_CONTRIB);
    return Object.assign({},c,{py:py,h:ALT_NIV[3]});
  });

  var yM=PAD+(svgH-PAD*2-hM)/2;
  var posM=[];
  var yAcc=yM;
  minutaOrdem.forEach(function(n){
    posM.push({id:n.id,nome:n.nome,nivel:n.nivel,tipo:n.tipo,py:yAcc,h:ALT_NIV[n.nivel]});
    yAcc+=ALT_NIV[n.nivel]+GAP_MINUTA;
  });

  // Mapa id→py para links
  var mapPY={};
  posM.forEach(function(n){mapPY[n.id]=n.py;});

  var out=[];
  out.push('<svg width="'+svgW+'" height="'+svgH+'" xmlns="http://www.w3.org/2000/svg">');

  // Cabeçalhos
  out.push('<text x="'+(xC+NODE_W_C/2)+'" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#aaa" letter-spacing="1">CONTRIBUICOES</text>');
  out.push('<text x="'+(xM+NODE_W_M/2)+'" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#aaa" letter-spacing="1">MINUTA DO PLANO DIRETOR</text>');

  // Links: contrib → nó classificado
  posC.forEach(function(c){
    if(!c.codigo||mapPY[c.codigo]===undefined)return;
    var y1=c.py+c.h/2, y2=mapPY[c.codigo]+ALT_NIV[mapM[c.codigo]?mapM[c.codigo].nivel:3]/2;
    var mx=(xC+NODE_W_C+xM)/2;
    out.push('<path d="M'+(xC+NODE_W_C)+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+xM+','+y2+'" fill="none" stroke="'+COR_CONTRIB+'" stroke-width="1" stroke-opacity="0.3"/>');
  });

  // Nós contribuições
  posC.forEach(function(c){
    var short=esc(c.texto.slice(0,30)+(c.texto.length>30?'...':''));
    var full=esc(c.texto);
    var cod=esc(c.codigo||'');
    out.push('<g class="nc" data-full="'+full+'" data-cod="'+cod+'">');
    out.push('<rect x="'+xC+'" y="'+c.py+'" width="'+NODE_W_C+'" height="'+c.h+'" rx="4" fill="'+COR_CONTRIB+'" fill-opacity=".82"/>');
    out.push('<text x="'+(xC+8)+'" y="'+(c.py+c.h/2)+'" dominant-baseline="middle" font-size="10" fill="white">'+short+'</text>');
    out.push('</g>');
  });

  // Nós minuta com indentação e tamanho por nível
  posM.forEach(function(n){
    var ind=IND_NIV[n.nivel]||0;
    var cor=COR_NIV[n.nivel]||'#999';
    var w=NODE_W_M-ind;
    var fs=n.nivel===1?11:n.nivel===2?10:9;
    var fw=n.nivel<=2?'700':'500';
    var short=esc(n.nome.slice(0,36)+(n.nome.length>36?'...':''));
    var full=esc(n.nome);
    out.push('<g class="nm" data-id="'+n.id+'" data-full="'+full+'">');
    out.push('<rect x="'+(xM+ind)+'" y="'+n.py+'" width="'+w+'" height="'+n.h+'" rx="4" fill="'+cor+'" fill-opacity=".85"/>');
    out.push('<text x="'+(xM+ind+8)+'" y="'+(n.py+n.h/2)+'" dominant-baseline="middle" font-size="'+fs+'" font-weight="'+fw+'" fill="white">'+short+'</text>');
    out.push('</g>');
  });

  out.push('</svg>');
  document.getElementById('sankey-wrap').innerHTML=out.join('');

  // Tooltip
  var ttp=document.getElementById('ttp');
  document.querySelectorAll('.nc').forEach(function(el){
    el.addEventListener('mouseenter',function(e){
      ttp.innerHTML='<span style="color:#e8a0a8;font-weight:600">Contribuicao</span>'+(el.dataset.cod?'<br><span style="color:#aaa;font-size:.67rem">'+el.dataset.cod+'</span>':'')+'<br>'+el.dataset.full.slice(0,200)+(el.dataset.full.length>200?'...':'');
      ttp.style.left=(e.clientX+14)+'px';ttp.style.top=(e.clientY-10)+'px';ttp.classList.add('vis');
    });
    el.addEventListener('mouseleave',function(){ttp.classList.remove('vis');});
    el.addEventListener('mousemove',function(e){ttp.style.left=(e.clientX+14)+'px';ttp.style.top=(e.clientY-10)+'px';});
  });
  document.querySelectorAll('.nm').forEach(function(el){
    el.addEventListener('mouseenter',function(e){
      var n=mapM[el.dataset.id];if(!n)return;
      ttp.innerHTML='<strong style="color:#ddd">'+n.tipo+'</strong><br>'+el.dataset.full+'<br><span style="color:#aaa;font-size:.67rem">ID: '+n.id+'</span>';
      ttp.style.left=(e.clientX+14)+'px';ttp.style.top=(e.clientY-10)+'px';ttp.classList.add('vis');
    });
    el.addEventListener('mouseleave',function(){ttp.classList.remove('vis');});
    el.addEventListener('mousemove',function(e){ttp.style.left=(e.clientX+14)+'px';ttp.style.top=(e.clientY-10)+'px';});
  });
}

document.getElementById('sel-etapa').addEventListener('change',function(){popularOficinas(this.value);});
document.getElementById('sel-oficina').addEventListener('change',function(){desenhar();});
document.getElementById('sel-titulo').addEventListener('change',function(){desenhar();});
carregar();
</script></body></html>
